*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Nunito,sans-serif;background:var(--bg);color:var(--txt);}
.hdr{background:var(--sur);border-bottom:2px solid var(--brd);padding:12px 16px;display:flex;align-items:center;position:sticky;top:0;z-index:20;}
.hdr-title{font-size:20px;font-weight:900;flex:1;}
.dark-btn{background:var(--warm);border:2px solid var(--brd);border-radius:20px;padding:4px 10px;cursor:pointer;font-size:15px;}
.cnt{padding:12px 16px;color:#fff;display:flex;align-items:center;gap:14px;font-family:Nunito,sans-serif;}
.cnt-icon{font-size:36px;line-height:1;flex-shrink:0;}
.cnt-days{font-size:28px;font-weight:900;line-height:1;}
.cnt-sub{font-size:11px;font-weight:600;opacity:.8;margin-top:3px;}
.content{padding:14px;max-width:640px;margin:0 auto;}
.mth{font-size:16px;font-weight:900;margin:18px 0 10px;display:flex;align-items:center;gap:8px;}
.mth::after{content:"";flex:1;height:2px;background:var(--brd);border-radius:2px;}
.card{background:var(--sur);border:2px solid var(--brd);border-radius:var(--r);margin-bottom:8px;cursor:pointer;position:relative;overflow:hidden;box-shadow:var(--shd);}
.card.sebastian{border-left:5px solid var(--seb);}
.card.isabel{border-left:5px solid var(--isa);}
.card.now{box-shadow:0 0 0 2px #E53935,var(--shd);}
.card-name{position:absolute;left:0;top:0;bottom:0;width:20px;display:flex;align-items:center;justify-content:center;}
.card-name-v{writing-mode:vertical-rl;transform:rotate(180deg);font-size:9px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;}
.card-name-v.sebastian{color:var(--seb);}
.card-name-v.isabel{color:var(--isa);}
.card-body{padding:10px 10px 8px 26px;display:flex;align-items:center;gap:8px;}
.badge{font-size:18px;font-weight:900;min-width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.badge.sebastian{background:#E8F7EE;color:#2D8C4E;border:1.5px solid #A8D5B8;}
.badge.isabel{background:#E8F0FE;color:#2563EB;border:1.5px solid #A8C0F0;}
.card-info{flex:1;min-width:0;}
.card-date{font-size:15px;font-weight:800;color:var(--txt2);}
.card-note{font-size:11px;color:var(--txt3);font-weight:600;margin-top:1px;}
.ficon{position:absolute;top:7px;right:9px;font-size:18px;}
.chev{font-size:10px;color:var(--txt3);transition:transform .2s;margin-left:4px;}
.chev.open{transform:rotate(180deg);}
.acc{display:none;border-top:1px solid var(--brd);padding:8px 10px 10px 26px;}
.acc.open{display:block;}
.chips{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:8px;margin-bottom:8px;border-bottom:1px solid var(--brd);}
.chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:1px;padding:3px 6px;border-radius:6px;border:1.5px solid var(--brd);min-width:32px;}
.chip.s{background:#E8F7EE;border-color:#A8D5B8;}
.chip.i{background:#E8F0FE;border-color:#A8C0F0;}
.chip.half{background:linear-gradient(135deg,#E8F7EE 50%,#E8F0FE 50%);}
.chip.free{border-color:#F59E0B;border-width:2px;}
.chip.today{box-shadow:0 0 0 2px #F59E0B;}
.chip-d{font-size:11px;font-weight:900;color:var(--txt);}
.chip-dt{font-size:9px;color:var(--txt3);font-weight:600;}
.evt-empty{font-size:12px;color:var(--txt3);font-style:italic;padding:2px 0;}
.evt{display:flex;align-items:center;gap:0;padding:5px 0;border-bottom:1px solid var(--brd);}
.evt:last-child{border-bottom:none;}
.evt-bar{width:3px;height:22px;border-radius:2px;flex-shrink:0;margin-right:8px;background:#F59E0B;}
.evt-bar.r{background:#EC4899;}
.evt-bar.b{background:var(--txt3);}
.evt-bar.f{background:#8B5CF6;}
.evt-date{font-size:11px;font-weight:700;color:var(--txt3);width:40px;flex-shrink:0;}
.evt-time{font-size:11px;font-weight:700;color:var(--txt3);width:38px;flex-shrink:0;}
.evt-title{font-size:12px;font-weight:600;color:var(--txt);flex:1;}
</style>
</head>

  {date:[2026,12,15],time:null,title:'🎂 Mathias Reinemann',who:'geburtstag',type:'single',schoolOf:null},
  {date:[2026,12,25],time:null,title:'🎂 Livia Hangebrauck',who:'geburtstag',type:'single',schoolOf:null},
  // GSG Termine
  {date:[2026,4,20],time:'19:00',title:'Elternabend Julius',who:'julius',type:'single',schoolOf:'julius'},
  {date:[2026,2,17],time:null,title:'Kein Unterricht — Distanzlernen (Kinder zu Hause)',who:'julius',type:'single',schoolOf:'julius'},
  {date:[2026,5,7],time:'14:00',title:'2. Elternsprechtag Julius (14:00–19:00)',who:'julius',type:'single',schoolOf:'julius'},
  {date:[2026,5,14],time:null,title:'Christi Himmelfahrt — schulfrei',who:'julius',type:'single',schoolOf:'julius'},
  {date:[2026,5,15],time:null,title:'Beweglicher Ferientag — schulfrei',who:'julius',type:'single',schoolOf:'julius'},
  {date:[2026,6,4],time:null,title:'Fronleichnam — schulfrei',who:'julius',type:'single',schoolOf:'julius'},
  {date:[2026,6,5],time:null,title:'Beweglicher Ferientag — schulfrei',who:'julius',type:'single',schoolOf:'julius'},
  {recurring:{dow:2,until:[2026,7,19]},time:'16:30',title:'Turnen Rosalie',who:'rosalie',type:'recurring',schoolOf:null},
];

var FICON={oster:"&#x1F430;",pfingst:"&#x1F338;",sommer:"&#x2600;&#xFE0F;",herbst:"&#x1F342;",winter:"&#x1F332;"};
var MN=["Januar","Februar","M\u00e4rz","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
var DOW=["So","Mo","Di","Mi","Do","Fr","Sa"];
var now=new Date();

// Build termine map
var TM={};
function aT(k,t){if(!TM[k])TM[k]=[];TM[k].push(t);}
TR.forEach(function(t){
  if(t.date){aT(d2s(t.date[0],t.date[1],t.date[2]),{time:t.time,title:t.title,who:t.who,type:t.type,schoolOf:t.schoolOf||null,day:t.date[2],month:t.date[1]});}
  else if(t.dateRange){var c=dFA(t.dateRange[0]),e=dFA(t.dateRange[1]);while(c<=e){aT(d2s(c.getFullYear(),c.getMonth()+1,c.getDate()),{time:null,title:t.title,who:t.who,type:t.type||"single",schoolOf:t.schoolOf||null,day:c.getDate(),month:c.getMonth()+1});c.setDate(c.getDate()+1);}}
  else if(t.recurring){var u=dFA(t.recurring.until);var c=t.recurring.from?dFA(t.recurring.from):new Date(2026,0,1);while(c.getDay()!==t.recurring.dow)c.setDate(c.getDate()+1);while(c<=u){aT(d2s(c.getFullYear(),c.getMonth()+1,c.getDate()),{time:t.time,title:t.title,who:t.who,type:"recurring",schoolOf:null,day:c.getDate(),month:c.getMonth()+1});c.setDate(c.getDate()+7);}}
});

function isJulius(t){return t.who==="julius"||t.who==="both"||t.who==="familie"||t.who==="geburtstag"||(t.schoolOf==="julius"||t.schoolOf==="both");}

function getScore(day,blk,idx,isF,isL){
  var school=!isNS(day);
  var inF=!!blk.ferien;
  function parseH(note){if(!note||note.indexOf(">")<0)return -1;var a=note.split(">")[1].trim();var m=a.match(/(\d{1,2}):(\d{2})/);return m?parseInt(m[1]):-1;}
  if(isL&&idx<blocks.length-1){
    var nx=blocks[idx+1];var h=parseH(blk.note);
    if(school&&!inF&&h<0)return nx.wer==="sebastian"?{s:1,i:0}:{s:0,i:1};
    if(h<0)return blk.wer==="sebastian"?{s:1,i:0}:{s:0,i:1};
    if(h<10)return nx.wer==="sebastian"?{s:1,i:0}:{s:0,i:1};
    if(h>=17)return blk.wer==="sebastian"?{s:1,i:0}:{s:0,i:1};
    return {s:0.5,i:0.5};
  }
  if(isF&&idx>0){
    var pv=blocks[idx-1];var h=parseH(pv.note);
    if(school&&!inF&&h<0)return blk.wer==="sebastian"?{s:1,i:0}:{s:0,i:1};
    if(h<0)return blk.wer==="sebastian"?{s:1,i:0}:{s:0,i:1};
    if(h<10)return blk.wer==="sebastian"?{s:1,i:0}:{s:0,i:1};
    if(h>=17)return pv.wer==="sebastian"?{s:1,i:0}:{s:0,i:1};
    return {s:0.5,i:0.5};
  }
  return blk.wer==="sebastian"?{s:1,i:0}:{s:0,i:1};
}

// Show countdown — called first, independent
var cntEl=document.getElementById("cnt");
var curBlk=null;
for(var bi=0;bi<blocks.length;bi++){
  var v=dFA(blocks[bi].von),bx=dFA(blocks[bi].bis);
  if(now>=v&&now<bx){curBlk=blocks[bi];break;}
}
if(curBlk&&cntEl){
  var bis2=dFA(curBlk.bis);
  var diff=Math.ceil((bis2-now)/(1000*60*60*24));
  var isPapa=curBlk.wer==="sebastian";
  var wer=isPapa?"Papa":"Mama";
  var icon=isPapa?"&#x1F468;":"&#x1F469;";
  var bg=isPapa?"#4AAD6A":"#4B80F0";
  var txt=diff<=0?"Heute Wechsel":diff===1?"Noch 1 Tag":"Noch "+diff+" Tage";
  cntEl.style.background=bg;
  cntEl.style.display="flex";
  cntEl.innerHTML='<div class="cnt-icon">'+icon+'</div><div><div style="font-size:12px;font-weight:700;opacity:.85;margin-bottom:2px;">Du bist gerade bei '+wer+'</div><div class="cnt-days">'+txt+'</div><div class="cnt-sub">'+fmt(curBlk.von)+" &rarr; "+fmt(curBlk.bis)+'</div></div>';
}

function render(){
  var con=document.getElementById("main");
  if(!con)return;
  con.innerHTML="";
  var grp={},ord=[];
  blocks.forEach(function(b){var k=b.von[1];if(!grp[k]){grp[k]=[];ord.push(k);}grp[k].push(b);});
  ord.forEach(function(k){
    var sec=document.createElement("div");
    var mh=document.createElement("div");mh.className="mth";mh.textContent=MN[k-1]+" 2026";sec.appendChild(mh);
    grp[k].forEach(function(b){
      var blkIdx=blocks.indexOf(b);
      var vonD=dFA(b.von),bisD=dFA(b.bis);
      var isCur=now>=vonD&&now<bisD;
      // Events
      var evts=[],cur=new Date(vonD);
      while(true){
        var key=d2s(cur.getFullYear(),cur.getMonth()+1,cur.getDate());
        if(TM[key])TM[key].forEach(function(t){if(isJulius(t))evts.push(Object.assign({},t));});
        if(cur.getTime()===bisD.getTime())break;
        cur=new Date(cur.getFullYear(),cur.getMonth(),cur.getDate()+1);
      }
      evts.sort(function(a,b){return a.month!==b.month?a.month-b.month:a.day!==b.day?a.day-b.day:(a.time||"").localeCompare(b.time||"");});
      // Day score
      var ts=0,cur2=new Date(vonD);
      while(true){
        var key2=d2s(cur2.getFullYear(),cur2.getMonth()+1,cur2.getDate());
        var vonKey=d2s(b.von[0],b.von[1],b.von[2]),bisKey=d2s(b.bis[0],b.bis[1],b.bis[2]);
        var sc=getScore(cur2,b,blkIdx,key2===vonKey,key2===bisKey);
        ts+=sc.s;
        if(key2===bisKey)break;
        cur2=new Date(cur2.getFullYear(),cur2.getMonth(),cur2.getDate()+1);
      }
      // Card
      var card=document.createElement("div");
      card.className="card "+b.wer+(isCur?" now":"");
      // Name col
      var nc=document.createElement("div");nc.className="card-name";
      var nv=document.createElement("div");nv.className="card-name-v "+b.wer;
      nv.textContent=b.wer==="sebastian"?"Papa":"Mama";
      nc.appendChild(nv);card.appendChild(nc);
      // Ferien icon
      if(b.ferien){var fi=document.createElement("div");fi.className="ficon";fi.innerHTML=FICON[b.ferien]||"";card.appendChild(fi);}
      // Body
      var body=document.createElement("div");body.className="card-body";
      var bdg=document.createElement("div");bdg.className="badge "+b.wer;
      bdg.textContent=ts%1===0?ts.toFixed(0):ts.toFixed(1);
      body.appendChild(bdg);
      var info=document.createElement("div");info.className="card-info";
      var de=document.createElement("div");de.className="card-date";de.textContent=fmt(b.von)+" \u2192 "+fmt(b.bis);info.appendChild(de);
      if(b.note){var ne=document.createElement("div");ne.className="card-note";ne.textContent=b.note;info.appendChild(ne);}
      body.appendChild(info);
      var chev=document.createElement("span");chev.className="chev";chev.id="ch"+blkIdx;chev.textContent="\u25BC";
      body.appendChild(chev);
      card.appendChild(body);
      // Accordion
      var acc=document.createElement("div");acc.className="acc";acc.id="ac"+blkIdx;
      // Chips
      var chips=document.createElement("div");chips.className="chips";
      var cc=new Date(vonD);
      while(true){
        var ckey=d2s(cc.getFullYear(),cc.getMonth()+1,cc.getDate());
        var vk=d2s(b.von[0],b.von[1],b.von[2]),bk=d2s(b.bis[0],b.bis[1],b.bis[2]);
        var sc2=getScore(cc,b,blkIdx,ckey===vk,ckey===bk);
        var isToday2=cc.getFullYear()===now.getFullYear()&&cc.getMonth()===now.getMonth()&&cc.getDate()===now.getDate();
        var isFree=isNS(cc)&&cc.getDay()!==0&&cc.getDay()!==6;
        var chip=document.createElement("div");
        var cls="chip";
        if(sc2.s===1)cls+=" s";else if(sc2.i===1)cls+=" i";else if(sc2.s===0.5)cls+=" half";
        if(isFree)cls+=" free";
        if(isToday2)cls+=" today";
        chip.className=cls;
        var d1=document.createElement("div");d1.className="chip-d";d1.textContent=DOW[cc.getDay()];
        var d2=document.createElement("div");d2.className="chip-dt";d2.textContent=String(cc.getDate()).padStart(2,"0")+"."+String(cc.getMonth()+1).padStart(2,"0")+".";
        chip.appendChild(d1);chip.appendChild(d2);chips.appendChild(chip);
        if(ckey===bk)break;
        cc=new Date(cc.getFullYear(),cc.getMonth(),cc.getDate()+1);
      }
      acc.appendChild(chips);
      if(evts.length===0){var em=document.createElement("div");em.className="evt-empty";em.textContent="Keine Termine";acc.appendChild(em);}
      else{evts.forEach(function(t){
        var item=document.createElement("div");item.className="evt";
        var bc=t.who==="rosalie"?"r":t.who==="both"?"b":(t.who==="familie"||t.who==="geburtstag")?"f":"";
        var bar=document.createElement("div");bar.className="evt-bar "+bc;
        var dc=document.createElement("div");dc.className="evt-date";dc.textContent=String(t.day).padStart(2,"0")+"."+String(t.month).padStart(2,"0")+".";
        var tc=document.createElement("div");tc.className="evt-time";tc.textContent=t.time||"";
        var ttl=document.createElement("div");ttl.className="evt-title";ttl.textContent=t.title;
        item.appendChild(bar);item.appendChild(dc);item.appendChild(tc);item.appendChild(ttl);acc.appendChild(item);
      });}
      card.appendChild(acc);
      card.onclick=function(){
        var id=this.querySelector(".acc").id;
        var a=document.getElementById(id);
        var c=document.getElementById("ch"+id.substring(2));
        if(a){a.classList.toggle("open");if(c)c.classList.toggle("open");}
      };
      sec.appendChild(card);
    });
    con.appendChild(sec);
  });
  setTimeout(function(){var c=document.querySelector(".now");if(c)c.scrollIntoView({behavior:"instant",block:"start"});},50);
}

function toggleDark(){
  var isDark=document.documentElement.getAttribute("data-theme")==="dark";
  document.documentElement.setAttribute("data-theme",isDark?"light":"dark");
  document.getElementById("dbtn").textContent=isDark?"\u{1F319}":"\u2600\uFE0F";
  localStorage.setItem("j-theme",isDark?"light":"dark");
}
(function(){var t=localStorage.getItem("j-theme");if(t==="dark")document.documentElement.setAttribute("data-theme","dark");})();

render();
</script>
