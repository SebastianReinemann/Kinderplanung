  --rosalie: #DB2777; --rosalie-mid: #EC4899;
  --familie: #7C3AED; --familie-mid: #8B5CF6; --familie-light: #EDE9FE;

  --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-lg: 0 4px 24px rgba(0,0,0,0.1);
  --radius: 14px; --radius-sm: 10px;
}
[data-theme="dark"] {
  --bg: #141210; --surface: #1E1B17; --warm: #252118;
  --text: #FFFFFF; --text2: #E8E0D8; --text3: #7A7168; --border: #3D3630;

  --julius-light: #2A1F08; --julius-pale: #1E1608;
  --sebastian-pale: #152A1C; --sebastian-light: #1C3824;
  --isabel-pale: #131B2E; --isabel-light: #182338;
  --familie-light: #1E1230;

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
.header { position: sticky; top: 0; z-index: 30; background: var(--surface); border-bottom: 2px solid var(--julius-mid); box-shadow: var(--shadow); padding: 12px 16px 10px; display: flex; align-items: center; gap: 10px; }
.header-title { font-family: Nunito, sans-serif; font-size: 20px; font-weight: 900; color: var(--julius); flex: 1; }
.header-sub { font-size: 12px; color: var(--text3); font-weight: 600; }
.dark-btn { background: var(--warm); border: 2px solid var(--border); border-radius: 20px; padding: 4px 10px; cursor: pointer; font-size: 15px; }

/* Banner */
.banner { color: #fff; padding: 14px 16px; font-family: Nunito, sans-serif; display: flex; align-items: center; gap: 14px; }
.banner.sebastian { background: linear-gradient(135deg, #2D8C4E, #4AAD6A); }
.banner.isabel { background: linear-gradient(135deg, #2563EB, #4B80F0); }
.banner-icon { font-size: 32px; flex-shrink: 0; }
.banner-body { flex: 1; }
.banner-wer { font-size: 13px; font-weight: 700; opacity: 0.85; margin-bottom: 2px; }
.banner-countdown-big { font-size: 28px; font-weight: 900; line-height: 1; letter-spacing: -0.5px; }
.banner-dates { font-size: 11px; font-weight: 600; opacity: 0.75; margin-top: 3px; }

/* Content */
.content { padding: 16px; max-width: 640px; margin: 0 auto; }
.month-title { font-family: Nunito, sans-serif; font-size: 16px; font-weight: 900; color: var(--text); margin: 20px 0 10px; display: flex; align-items: center; gap: 10px; }
.month-title::after { content: ''; flex: 1; height: 2px; background: var(--border); border-radius: 2px; }

/* Block card */
.block-card { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; box-shadow: var(--shadow); cursor: pointer; position: relative; }
.block-card.current { border-color: #E53935; box-shadow: 0 0 0 2px rgba(229,57,53,0.2), var(--shadow-lg); }
.block-card.sebastian { border-left: 5px solid var(--sebastian-mid); }
.block-card.isabel { border-left: 5px solid var(--isabel-mid); }
.card-name-col { position: absolute; left: 0; top: 0; bottom: 0; width: 20px; display: flex; align-items: center; justify-content: center; }
.card-name-vert { writing-mode: vertical-rl; transform: rotate(180deg); font-family: Nunito, sans-serif; font-size: 9px; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; color: var(--sebastian-mid); }
.card-name-vert.isabel { color: var(--isabel-mid); }
.card-body { padding: 10px 10px 8px 28px; }
.card-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.card-badge { font-family: Nunito, sans-serif; font-size: 18px; font-weight: 900; min-width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.card-badge.sebastian { background: var(--sebastian-pale); color: var(--sebastian); border: 1.5px solid var(--sebastian-light); }
.card-badge.isabel { background: var(--isabel-pale); color: var(--isabel); border: 1.5px solid var(--isabel-light); }
.card-info { flex: 1; min-width: 0; }
.card-date { font-family: Nunito, sans-serif; font-size: 15px; font-weight: 800; color: var(--text2); }
.card-note { font-size: 11px; color: var(--text3); font-weight: 600; margin-top: 1px; }
.ferien-icon { position: absolute; top: 7px; right: 9px; font-size: 18px; }
.chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; margin-left: auto; padding-right: 6px; }
.chevron.open { transform: rotate(180deg); }

/* Accordion */
.acc { display: none; border-top: 1px solid var(--border); padding: 8px 12px 10px 28px; }
.acc.open { display: block; }

/* Day chips */
.chips-row { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; padding-bottom: 8px; margin-bottom: 8px; border-bottom: 1px solid var(--border); }
.chip { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 1px; padding: 3px 6px; border-radius: 6px; border: 1.5px solid var(--border); min-width: 32px; }
.chip.seb { background: var(--sebastian-pale); border-color: var(--sebastian-light); }
.chip.isa { background: var(--isabel-pale); border-color: var(--isabel-light); }
.chip.half { background: linear-gradient(135deg, var(--sebastian-pale) 50%, var(--isabel-pale) 50%); }
.chip.free-day { border-width: 2px; border-color: #F59E0B; }
.chip.today { box-shadow: 0 0 0 2px var(--julius-mid); }
.chip-dow { font-family: Nunito, sans-serif; font-size: 11px; font-weight: 900; color: var(--text); }
.chip-date { font-size: 9px; color: var(--text3); font-weight: 600; }

/* Events */
.acc-empty { font-size: 12px; color: var(--text3); font-style: italic; }
.acc-item { display: flex; align-items: center; gap: 0; padding: 5px 0; border-bottom: 1px solid var(--border); }
.acc-item:last-child { border-bottom: none; }
.acc-bar { width: 3px; height: 24px; border-radius: 2px; flex-shrink: 0; margin-right: 8px; background: var(--julius-mid); }
.acc-bar.rosalie { background: var(--rosalie-mid); }
.acc-bar.both { background: var(--text3); }
.acc-bar.familie { background: var(--familie-mid); }
.acc-bar.geburtstag { background: var(--familie-mid); }
.acc-date-col { font-size: 11px; font-weight: 700; color: var(--text3); width: 42px; flex-shrink: 0; font-family: Nunito, sans-serif; }
.acc-time-col { font-size: 11px; font-weight: 700; color: var(--text3); width: 40px; flex-shrink: 0; font-family: Nunito, sans-serif; }
.acc-title { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; }

/* Tags row */
.tags-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 2px; }
.tag { font-size: 9px; font-weight: 800; padding: 1px 6px; border-radius: 10px; font-family: Nunito, sans-serif; }
.tag.julius { background: var(--julius-light); color: var(--julius); }
.tag.rosalie { background: var(--rosalie-mid); color: #fff; }
.tag.both { background: var(--warm); color: var(--text2); }
.tag.familie { background: var(--familie-light); color: var(--familie-mid); }
.tag.school { background: var(--surface); border: 1px solid var(--border); color: var(--text3); }
</style>

const FERIEN_ICON={oster:'🐰',pfingst:'🌸',sommer:'☀️',herbst:'🍂',winter:'🌲'};
const MN=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const DOW=['So','Mo','Di','Mi','Do','Fr','Sa'];
const now=new Date();

// Build termine map
const TM={};
function aT(k,t){if(!TM[k])TM[k]=[];TM[k].push(t);}
TR.forEach(t=>{
  if(t.date){aT(d2s(t.date[0],t.date[1],t.date[2]),{time:t.time,title:t.title,who:t.who,type:t.type,schoolOf:t.schoolOf||null,day:t.date[2],month:t.date[1]});}
  else if(t.dateRange){let c=dFA(t.dateRange[0]),e=dFA(t.dateRange[1]);while(c<=e){aT(d2s(c.getFullYear(),c.getMonth()+1,c.getDate()),{time:null,title:t.title,who:t.who,type:t.type||'single',schoolOf:t.schoolOf||null,day:c.getDate(),month:c.getMonth()+1});c.setDate(c.getDate()+1);}}
  else if(t.recurring){const u=dFA(t.recurring.until);let c=t.recurring.from?dFA(t.recurring.from):new Date(2026,0,1);while(c.getDay()!==t.recurring.dow)c.setDate(c.getDate()+1);while(c<=u){aT(d2s(c.getFullYear(),c.getMonth()+1,c.getDate()),{time:t.time,title:t.title,who:t.who,type:'recurring',schoolOf:null,day:c.getDate(),month:c.getMonth()+1});c.setDate(c.getDate()+7);}}
});

// Filter: only Julius-relevant events
function isJuliusEvent(t){
  return t.who==='julius'||t.who==='both'||t.who==='familie'||t.who==='geburtstag'||(t.schoolOf==='julius'||t.schoolOf==='both');
}

// getDayScore (simplified for display)
function getDayScore(dayDate,blk,blkIdx,isFirst,isLast){
  const isSchool=!isNonSchool(dayDate);
  const inFerien=!!blk.ferien;
  if(isLast&&blkIdx<blocks.length-1){
    const next=blocks[blkIdx+1];
    const note=blk.note||'';
    const after=note.includes('→')?note.split('→')[1].trim():'';
    const tm=after.match(/(\d{1,2}):(\d{2})/);
    const hour=tm?parseInt(tm[1]):-1;
    if(isSchool&&!inFerien&&hour<0)return next.wer==='sebastian'?{s:1,i:0}:{s:0,i:1};
    if(hour<0)return blk.wer==='sebastian'?{s:1,i:0}:{s:0,i:1};
    if(hour<10)return next.wer==='sebastian'?{s:1,i:0}:{s:0,i:1};
    if(hour>=17)return blk.wer==='sebastian'?{s:1,i:0}:{s:0,i:1};
    return {s:0.5,i:0.5};
  }
  if(isFirst&&blkIdx>0){
    const prev=blocks[blkIdx-1];
    const note=prev.note||'';
    const after=note.includes('→')?note.split('→')[1].trim():'';
    const tm=after.match(/(\d{1,2}):(\d{2})/);
    const hour=tm?parseInt(tm[1]):-1;
    if(isSchool&&!inFerien&&hour<0)return blk.wer==='sebastian'?{s:1,i:0}:{s:0,i:1};
    if(hour<0)return blk.wer==='sebastian'?{s:1,i:0}:{s:0,i:1};
    if(hour<10)return blk.wer==='sebastian'?{s:1,i:0}:{s:0,i:1};
    if(hour>=17)return prev.wer==='sebastian'?{s:1,i:0}:{s:0,i:1};
    return {s:0.5,i:0.5};
  }
  return blk.wer==='sebastian'?{s:1,i:0}:{s:0,i:1};
}

function render(){
  const con=document.getElementById('content');
  con.innerHTML='';

  // Countdown card
  const curBlk=blocks.find(b=>{const v=dFA(b.von),bi=dFA(b.bis);return now>=v&&now<bi;});
  const card=document.getElementById('countdown-card');
  if(curBlk){
    const bis=dFA(curBlk.bis);
    const diff=Math.ceil((bis-now)/(1000*60*60*24));
    const isPapa=curBlk.wer==='sebastian';
    const wer=isPapa?'Papa':'Mama';
    const icon=isPapa?'👨':'👩';
    const bg=isPapa?'#4AAD6A':'#4B80F0';
    let txt=diff<=0?'Heute Übergabe':diff===1?'Noch 1 Tag':`Noch ${diff} Tage`;
    card.style.cssText=`display:flex;align-items:center;gap:14px;background:${bg};color:#fff;padding:14px 16px;`;
    card.innerHTML=`
      <div style="font-size:34px;line-height:1;">${icon}</div>
      <div>
        <div style="font-size:12px;font-weight:700;opacity:0.85;margin-bottom:2px;">Du bist gerade bei ${wer}</div>
        <div style="font-size:26px;font-weight:900;line-height:1;letter-spacing:-0.5px;">${txt}</div>
        <div style="font-size:11px;font-weight:600;opacity:0.75;margin-top:3px;">${fmt(curBlk.von)} → ${fmt(curBlk.bis)}</div>
      </div>`;
  } else {
    card.style.display='none';
  }

  // Group blocks by month
  const grp={},ord=[];
  blocks.forEach(b=>{const k=b.von[1];if(!grp[k]){grp[k]=[];ord.push(k);}grp[k].push(b);});

  ord.forEach(k=>{
    const sec=document.createElement('div');
    const mh=document.createElement('div');mh.className='month-title';mh.textContent=MN[k-1]+' 2026';sec.appendChild(mh);

    grp[k].forEach((b,bi_local)=>{
      const blkIdx=blocks.indexOf(b);
      const vonD=dFA(b.von),bisD=dFA(b.bis);
      const isCur=now>=vonD&&now<bisD;

      // Collect Julius events in this block
      let cur=new Date(vonD);
      const evts=[];
      while(cur<=bisD){
        const key=d2s(cur.getFullYear(),cur.getMonth()+1,cur.getDate());
        if(TM[key])TM[key].forEach(t=>{if(isJuliusEvent(t))evts.push({...t});});
        if(cur.getTime()===bisD.getTime())break;
        cur=new Date(cur.getFullYear(),cur.getMonth(),cur.getDate()+1);
      }
      evts.sort((a,b)=>a.month!==b.month?a.month-b.month:a.day!==b.day?a.day-b.day:(a.time||'').localeCompare(b.time||''));

      // Compute days for Julius (dad=sebastian)
      let ts=0,ti=0;
      cur=new Date(vonD);
      while(true){
        const key=d2s(cur.getFullYear(),cur.getMonth()+1,cur.getDate());
        const isFirst=key===d2s(b.von[0],b.von[1],b.von[2]);
        const isLast=key===d2s(b.bis[0],b.bis[1],b.bis[2]);
        const sc=getDayScore(cur,b,blkIdx,isFirst,isLast);
        ts+=sc.s;ti+=sc.i;
        if(isLast)break;
        cur=new Date(cur.getFullYear(),cur.getMonth(),cur.getDate()+1);
      }
      const papaDays=ts;

      // Card
      const card=document.createElement('div');
      card.className='block-card '+b.wer+(isCur?' current':'');
      card.style.position='relative';

      // Vertical name
      const nameCol=document.createElement('div');nameCol.className='card-name-col';
      const nameV=document.createElement('div');nameV.className='card-name-vert '+b.wer;nameV.textContent=b.wer==='sebastian'?'Papa':'Mama';
      nameCol.appendChild(nameV);card.appendChild(nameCol);

      // Ferien icon
      if(b.ferien){const fi=document.createElement('div');fi.className='ferien-icon';fi.textContent=FERIEN_ICON[b.ferien]||'';card.appendChild(fi);}

      // Body
      const body=document.createElement('div');body.className='card-body';

      const row1=document.createElement('div');row1.className='card-row1';
      const badge=document.createElement('div');badge.className='card-badge '+b.wer;
      badge.textContent=papaDays%1===0?papaDays.toFixed(0):papaDays.toFixed(1);
      row1.appendChild(badge);

      const info=document.createElement('div');info.className='card-info';
      const dateEl=document.createElement('div');dateEl.className='card-date';dateEl.textContent=fmt(b.von)+' → '+fmt(b.bis);info.appendChild(dateEl);
      if(b.note){const noteEl=document.createElement('div');noteEl.className='card-note';noteEl.textContent=b.note;info.appendChild(noteEl);}
      row1.appendChild(info);

      const chev=document.createElement('span');chev.className='chevron';chev.id='chev-'+blkIdx;chev.textContent='▼';
      row1.appendChild(chev);
      body.appendChild(row1);
      card.appendChild(body);

      // Accordion
      const acc=document.createElement('div');acc.className='acc';acc.id='acc-'+blkIdx;

      // Day chips
      const chips=document.createElement('div');chips.className='chips-row';
      cur=new Date(vonD);
      while(true){
        const key=d2s(cur.getFullYear(),cur.getMonth()+1,cur.getDate());
        const isFirst=key===d2s(b.von[0],b.von[1],b.von[2]);
        const isLast=key===d2s(b.bis[0],b.bis[1],b.bis[2]);
        const sc=getDayScore(cur,b,blkIdx,isFirst,isLast);
        const isToday=cur.getFullYear()===now.getFullYear()&&cur.getMonth()===now.getMonth()&&cur.getDate()===now.getDate();
        const isFree=isNonSchool(cur);
        const chip=document.createElement('div');
        let cls='chip';
        if(sc.s===1)cls+=' seb';else if(sc.i===1)cls+=' isa';else if(sc.s===0.5)cls+=' half';
        if(isFree&&cur.getDay()!==0&&cur.getDay()!==6)cls+=' free-day';
        if(isToday)cls+=' today';
        chip.className=cls;
        const d1=document.createElement('div');d1.className='chip-dow';d1.textContent=DOW[cur.getDay()];
        const d2=document.createElement('div');d2.className='chip-date';d2.textContent=String(cur.getDate()).padStart(2,'0')+'.'+String(cur.getMonth()+1).padStart(2,'0')+'.';
        chip.appendChild(d1);chip.appendChild(d2);chips.appendChild(chip);
        if(isLast)break;
        cur=new Date(cur.getFullYear(),cur.getMonth(),cur.getDate()+1);
      }
      acc.appendChild(chips);

      if(evts.length===0){
        const em=document.createElement('div');em.className='acc-empty';em.textContent='Keine Termine';acc.appendChild(em);
      } else {
        evts.forEach(t=>{
          const item=document.createElement('div');item.className='acc-item';
          const barCls=t.who==='familie'||t.who==='geburtstag'?'familie':t.who==='rosalie'?'rosalie':t.who==='both'?'both':'';
          const bar=document.createElement('div');bar.className='acc-bar '+barCls;
          const dc=document.createElement('div');dc.className='acc-date-col';dc.textContent=String(t.day).padStart(2,'0')+'.'+String(t.month).padStart(2,'0')+'.';
          const tc=document.createElement('div');tc.className='acc-time-col';tc.textContent=t.time||'';
          const ttl=document.createElement('div');ttl.className='acc-title';ttl.textContent=t.title;
          item.appendChild(bar);item.appendChild(dc);item.appendChild(tc);item.appendChild(ttl);
          acc.appendChild(item);
        });
      }

      card.appendChild(acc);
      card.onclick=()=>{
        acc.classList.toggle('open');
        document.getElementById('chev-'+blkIdx).classList.toggle('open');
      };
      sec.appendChild(card);
    });
    con.appendChild(sec);
  });

  // Scroll to current
  setTimeout(()=>{const c=document.querySelector('.current');if(c)c.scrollIntoView({behavior:'instant',block:'start'});},50);
}

function toggleDark(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('darkbtn').textContent=isDark?'🌙':'☀️';
  localStorage.setItem('theme-julius',isDark?'light':'dark');
}
(function(){
  const t=localStorage.getItem('theme-julius');
  if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',()=>{const b=document.getElementById('darkbtn');if(b)b.textContent='☀️';});}
})();

render();
