<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinderplanung 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --sebastian: #2D8C4E; --sebastian-mid: #4AAD6A; --sebastian-light: #E8F7EE; --sebastian-pale: #F3FBF6;
  --isabel: #2563EB; --isabel-mid: #4B80F0; --isabel-light: #E8F0FE; --isabel-pale: #F0F5FF;
  --julius: #D97706; --julius-mid: #F59E0B; --julius-light: #FEF3C7;
  --rosalie: #DB2777; --rosalie-mid: #EC4899; --rosalie-light: #FCE7F3;
  --familie: #7C3AED; --familie-mid: #8B5CF6; --familie-light: #EDE9FE;
  --bg: #FAF8F5; --surface: #FFFFFF; --warm: #F5F1EB; --warm2: #EDE8E0;
  --text: #2D2926; --text2: #6B6560; --text3: #A89F96; --border: #E8E2D9;
  --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-lg: 0 4px 24px rgba(0,0,0,0.1);
  --radius: 16px; --radius-sm: 10px; --card-h: 90px;
}
[data-theme="dark"] {
  --bg: #141210; --surface: #1E1B17; --warm: #252118; --warm2: #2E2920;
  --text: #FFFFFF; --text2: #E8E0D8; --text3: #A89F96; --border: #3D3630;
  --shadow: 0 2px 12px rgba(0,0,0,0.4); --shadow-lg: 0 4px 24px rgba(0,0,0,0.5);
  --sebastian: #4AAD6A; --sebastian-mid: #5DC47E; --sebastian-pale: #152A1C; --sebastian-light: #1C3824;
  --isabel: #6B9FFF; --isabel-mid: #7AACFF; --isabel-pale: #131B2E; --isabel-light: #182338;
  --julius: #FFC14D; --julius-mid: #FFD066; --julius-light: #2A1F08;
  --rosalie: #FF6EAA; --rosalie-mid: #FF85B8; --rosalie-light: #2A0E1A;
  --familie: #B47AFF; --familie-mid: #C490FF; --familie-light: #1E1230;
}

[data-theme="dark"] .topbar { background: var(--surface); }
[data-theme="dark"] .changelog { background: #201C10; border-color: #3D3420; }
[data-theme="dark"] .person-box.kommentar { background: #2A2010; border-color: #8A7040; }
[data-theme="dark"] .current-banner { filter: brightness(0.85); }
[data-theme="dark"] .day.all-sebastian { background: var(--sebastian-pale); }
[data-theme="dark"] .day.all-isabel { background: var(--isabel-pale); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── TOPBAR (fully sticky) ── */
.topbar {
  position: sticky; top: 0; z-index: 30;
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  box-shadow: var(--shadow);
}
.topbar-main {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px 0;
  flex-wrap: wrap;
}
.logo { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900; letter-spacing: -0.5px; color: var(--text); }
.logo span { color: var(--sebastian-mid); }
.year-badge { background: var(--warm); color: var(--text3); font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; border: 1px solid var(--border); }
.filters { display: flex; gap: 5px; margin-left: auto; }
.filter-btn { padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border); font-size: 12px; font-weight: 700; cursor: pointer; background: var(--warm); color: var(--text2); transition: all 0.15s; font-family: 'Nunito', sans-serif; }
.filter-btn.active-all { background: var(--text); color: #fff; border-color: var(--text); }
.filter-btn.active-sebastian { background: var(--sebastian-light); color: var(--sebastian); border-color: var(--sebastian-mid); }
.filter-btn.active-isabel { background: var(--isabel-light); color: var(--isabel); border-color: var(--isabel-mid); }

.topbar-row2 {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
}
.tabs-inline { display: flex; }
.tab { padding: 8px 16px; font-size: 12px; font-weight: 700; cursor: pointer; background: transparent; color: var(--text3); border: none; border-bottom: 3px solid transparent; transition: all 0.15s; font-family: 'Nunito', sans-serif; }
.tab.active { color: var(--text); border-bottom-color: var(--sebastian-mid); }
.filters-inline { display: flex; gap: 5px; align-items: center; }

.changelog { background: #FFFBF0; padding: 8px 20px; border-bottom: 1px solid #F3E8C0; }
.changelog-title { font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--julius); margin-bottom: 4px; }
.changelog-empty { font-size: 11px; color: var(--text3); font-style: italic; }
.changelog-list { display: flex; flex-direction: column; gap: 2px; }
.changelog-item { display: flex; gap: 10px; font-size: 11px; }
.changelog-date { font-weight: 700; color: var(--julius); min-width: 70px; flex-shrink: 0; font-family: 'Nunito', sans-serif; }
.changelog-text { color: var(--text2); }

/* Current banner */
.current-banner {
  background: var(--sebastian-mid); color: #fff;
  padding: 7px 20px;
  font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
}
.current-banner.isabel { background: var(--isabel-mid); }
.current-banner-label { opacity: 0.8; font-weight: 600; font-size: 11px; }
.current-banner-date { font-size: 14px; letter-spacing: -0.2px; }

/* Vertical name on card left */
.card-name-vert {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-family: 'Nunito', sans-serif;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  white-space: nowrap;
  padding: 10px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.card-name-vert.sebastian { color: var(--sebastian-mid); }
.card-name-vert.isabel { color: var(--isabel-mid); }
.card-name-col {
  display: flex; align-items: center; justify-content: center;
  width: 20px; flex-shrink: 0;
  border-right: 2px solid var(--sebastian-light);
  background: var(--sebastian-pale);
  border-radius: calc(var(--radius) - 2px) 0 0 calc(var(--radius) - 2px);
}
.entry-card.isabel .card-name-col {
  border-right-color: var(--isabel-light);
  background: var(--isabel-pale);
}
.entry-card.f-oster .card-name-col,
.entry-card.f-pfingst .card-name-col,
.entry-card.f-sommer .card-name-col,
.entry-card.f-herbst .card-name-col,
.entry-card.f-winter .card-name-col { background: transparent; }

.content { padding: 24px; max-width: 960px; margin: 0 auto; }
.month-block { margin-bottom: 28px; }
.month-title { font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 900; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
.month-title::after { content: ''; flex: 1; height: 2px; background: var(--border); border-radius: 2px; }

.entry-card { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); margin-bottom: 7px; box-shadow: var(--shadow); transition: transform 0.12s, box-shadow 0.12s; overflow: hidden; cursor: pointer; }
.entry-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.entry-card.sebastian { border-left: 5px solid var(--sebastian-mid); }
.entry-card.isabel { border-left: 5px solid var(--isabel-mid); }
.entry-card.current-block { border-left-color: #E53935 !important; border-top: 2px solid #E53935; border-right: 2px solid #E53935; border-bottom: 2px solid #E53935; box-shadow: 0 0 0 1px rgba(229,57,53,0.15), var(--shadow-lg); }



/* Card inner — always two rows */
.card-inner { display: flex; align-items: stretch; position: relative; }
.card-content-wrap { flex: 1; padding: 10px 12px 10px 8px; min-width: 0; }
.card-row1 { display: flex; align-items: flex-start; gap: 0; min-height: 48px; }
.card-info { flex: 1; min-width: 0; }
.entry-who { font-size: 14px; font-weight: 800; font-family: 'Nunito', sans-serif; }
.entry-who.sebastian { color: var(--sebastian); }
.entry-who.isabel { color: var(--isabel); }
.entry-note { font-size: 11px; color: var(--text3); font-weight: 600; margin-top: 1px; }
.entry-note-empty { font-style: italic; opacity: 0.45; }
.person-box.party { background: #FFF8E1; border-color: #FFD54F; }
.person-box.party .person-box-name { color: #F57F17; }
.entry-date { font-size: 17px; color: var(--text2); font-weight: 800; font-family: 'Nunito', sans-serif; margin-top: 2px; }

/* Ferien icon — top right corner */
.card-ferien-icon { font-size: 32px; line-height: 1; flex-shrink: 0; padding: 2px 10px 2px 4px; align-self: center; }

.card-row2 { display: flex; align-items: stretch; gap: 5px; margin-top: 10px; flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.card-row2::-webkit-scrollbar { display: none; }

/* Person card boxes */
.person-box {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  flex-shrink: 0;
  border-radius: 10px;
  padding: 6px 8px 5px;
  border: 1.5px solid transparent;
  min-width: 68px;
}
.person-box.rosalie { background: var(--rosalie-light); border-color: var(--rosalie-mid); }
.person-box.julius { background: var(--julius-light); border-color: var(--julius-mid); }
.person-box.familie { background: var(--familie-light); border-color: var(--familie-mid); }
.person-box.inactive { background: var(--warm); border-color: var(--border); opacity: 0.35; }
.person-box.kommentar { background: #FFF9EB; border-color: #F3C96B; }
.person-box.kommentar .person-box-name { color: #B45309; }

.person-box-name { font-size: 9px; font-weight: 900; font-family: 'Nunito', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
.person-box.rosalie .person-box-name { color: var(--rosalie); }
.person-box.julius .person-box-name { color: var(--julius); }
.person-box.familie .person-box-name { color: var(--familie); }
.person-box.inactive .person-box-name { color: var(--text3); }

.person-box-icons { display: flex; gap: 3px; align-items: center; }

.bp { display: flex; align-items: center; gap: 2px; font-size: 10px; font-weight: 800; font-family: 'Nunito', sans-serif; padding: 2px 5px; border-radius: 20px; border: 1.5px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.6); color: inherit; white-space: nowrap; }
.bp.zero { opacity: 0.4; background: rgba(255,255,255,0.3); }

.chevron-wrap { margin-left: auto; padding-right: 4px; flex-shrink: 0; }
.chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; display: block; }
.chevron.open { transform: rotate(180deg); }

.entry-accordion { display: none; border-top: 1px solid var(--border); padding: 10px 16px 12px; }
.entry-accordion.open { display: block; }
.acc-sec { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); padding: 6px 0 4px; font-family: 'Nunito', sans-serif; }
.acc-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.acc-item:last-child { border-bottom: none; }
.acc-bar { width: 3px; height: 26px; border-radius: 2px; flex-shrink: 0; }
.acc-bar.julius { background: var(--julius); }
.acc-bar.rosalie { background: var(--rosalie); }
.acc-bar.both { background: var(--text3); }
.acc-bar.familie { background: var(--familie); }
.acc-time { font-size: 12px; font-weight: 700; color: var(--text3); min-width: 48px; font-family: 'Nunito', sans-serif; }
.acc-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.acc-who { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 10px; font-family: 'Nunito', sans-serif; }
.acc-who.julius { background: var(--julius-light); color: var(--julius); }
.acc-who.rosalie { background: var(--rosalie-light); color: var(--rosalie); }
.acc-who.both { background: var(--warm2); color: var(--text2); }
.acc-who.familie { background: var(--familie-light); color: var(--familie); }

.cal-view { display: none; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.cal-nav-btn { width: 40px; height: 40px; background: var(--surface); border: 2px solid var(--border); border-radius: 50%; cursor: pointer; color: var(--text2); font-size: 18px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); transition: all 0.15s; }
.cal-nav-btn:hover { border-color: var(--sebastian-mid); }
.cal-month-title { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 900; }
.cal-dow-row { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; margin-bottom: 6px; }
.cal-dow { text-align: center; font-size: 12px; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; padding: 4px 0; font-family: 'Nunito', sans-serif; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
.day { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 8px 6px 6px; min-height: 90px; transition: all 0.15s; box-shadow: var(--shadow); display: flex; flex-direction: column; }
.day.empty { background: transparent; border-color: transparent; box-shadow: none; }
.day:hover:not(.empty) { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: var(--text3); }
.day.today { border-color: var(--sebastian-mid) !important; box-shadow: 0 0 0 3px rgba(74,173,106,0.2); }
.day.all-sebastian { background: var(--sebastian-pale); border-color: var(--sebastian-light); }
.day.all-isabel { background: var(--isabel-pale); border-color: var(--isabel-light); }
.day.split { background: linear-gradient(135deg, var(--sebastian-pale) 50%, var(--isabel-pale) 50%); }
.day.split.i2s { background: linear-gradient(135deg, var(--isabel-pale) 50%, var(--sebastian-pale) 50%); }
.day-num { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900; color: var(--text3); line-height: 1; margin-bottom: 5px; display: inline-block; }
.day.all-sebastian .day-num { color: var(--sebastian); }
.day.all-isabel .day-num { color: var(--isabel); }
.day.today .day-num { background: var(--sebastian-mid); color: #fff; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; margin-bottom: 5px; }
.day-events { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.day-event { font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 4px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-family: 'Nunito', sans-serif; }
.day-event.ferien { background: rgba(245,158,11,0.15); color: #92400E; }
.day-event.julius { background: var(--julius-light); color: var(--julius); }
.day-event.rosalie { background: var(--rosalie-light); color: var(--rosalie); }
.day-event.both { background: var(--warm2); color: var(--text2); }
.day-event.familie { background: var(--familie-light); color: var(--familie); }

@media (max-width: 640px) {
  .content { padding: 16px; }
  .topbar-main { padding: 10px 16px 0; }
  .topbar-row2 { padding: 0 16px; }
  .changelog { padding: 8px 16px; }
  .current-banner { padding: 7px 16px; }
  .day { min-height: 56px; padding: 4px; }
  .day-event { display: none; }
  .day-num { font-size: 13px; }
  .cal-grid { gap: 3px; }
}
</style>
</head>
<body>

<div class="topbar">
  <!-- Row 1: Logo + Dark Mode -->
  <div class="topbar-main">
    <div class="logo">Kinder<span>planung</span></div>
    <div class="year-badge">2026</div>
    <button id="darkbtn" onclick="toggleDark()" style="margin-left:auto;background:var(--warm);border:2px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:15px;flex-shrink:0;" title="Dunkelmodus">🌙</button>
  </div>
  <!-- Row 2: Tabs + Filters inline -->
  <div class="topbar-row2">
    <div class="tabs-inline">
      <button class="tab active" onclick="setView('list',event)">📋 Liste</button>
      <button class="tab" onclick="setView('stundenplan',event)">📚 Stundenpläne</button>
      <button class="tab" id="todo-tab" onclick="setView('todo',event)">✅ ToDo</button>
      <button class="tab" onclick="setView('cal',event)">📅 Kalender</button>
      <button class="tab" onclick="setView('auswertung',event)">📊 Auswertung</button>
      <button class="tab" onclick="setView('historie',event)">📝 Historie</button>
    </div>
    <div class="filters-inline">
      <button class="filter-btn active-all" onclick="setFilter('all')">Alle</button>
      <button class="filter-btn" onclick="setFilter('sebastian')">Sebastian</button>
      <button class="filter-btn" onclick="setFilter('isabel')">Isabel</button>
    </div>
  </div>
  <!-- Row 3: Changelog -->

  <!-- Row 4: Current banner -->
  <div id="current-banner" style="display:none"></div>
</div>

<div class="content">
  <div id="list-view"></div>
  <div id="cal-view" class="cal-view">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="prevMonth()">‹</button>
      <div class="cal-month-title" id="cal-title"></div>
      <button class="cal-nav-btn" onclick="nextMonth()">›</button>
      <button class="cal-nav-btn" onclick="goToday()" style="font-size:11px;font-weight:800;font-family:Nunito,sans-serif;width:auto;padding:0 10px;border-radius:20px;" title="Heute">Heute</button>
    </div>
    <div class="cal-dow-row" id="cal-dows"></div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div id="auswertung-view" style="display:none"></div>
  <div id="historie-view" style="display:none"></div>
  <div id="stundenplan-view" style="display:none"></div>
  <div id="todo-view" style="display:none"></div>
</div>

<script>

  {von:[2026,1,23],bis:[2026,1,28],wer:'sebastian',note:'Fr 13:00 → Mi 08:00',ferien:null},
  {von:[2026,1,28],bis:[2026,2,6],wer:'isabel',note:'Mi 13:30 → Fr 08:00',ferien:null},
  {von:[2026,2,6],bis:[2026,2,11],wer:'sebastian',note:'Fr 13:00 → Mi 08:00',ferien:null},

function d2s(y,m,d){return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function dFA(a){return new Date(a[0],a[1]-1,a[2]);}
function fmt(a){return String(a[2]).padStart(2,'0')+'.'+String(a[1]).padStart(2,'0')+'.';}

const dayMap={};
blocks.forEach(b=>{let c=dFA(b.von),e=dFA(b.bis);while(c<e){const k=d2s(c.getFullYear(),c.getMonth()+1,c.getDate());if(!dayMap[k])dayMap[k]={wer:b.wer,ferien:b.ferien,trans:false};c.setDate(c.getDate()+1);}});
blocks.forEach((b,i)=>{if(i<blocks.length-1){const td=dFA(b.bis),k=d2s(td.getFullYear(),td.getMonth()+1,td.getDate());if(dayMap[k]){dayMap[k].trans=true;dayMap[k].fromWer=b.wer;dayMap[k].toWer=blocks[i+1].wer;}}});

const TM={};
function aT(k,t){if(!TM[k])TM[k]=[];TM[k].push(t);}
TR.forEach(t=>{
  if(t.date){aT(d2s(t.date[0],t.date[1],t.date[2]),{time:t.time,title:t.title,who:t.who,type:t.type,schoolOf:t.schoolOf||null});}
  else if(t.dateRange){let c=dFA(t.dateRange[0]),e=dFA(t.dateRange[1]);while(c<=e){aT(d2s(c.getFullYear(),c.getMonth()+1,c.getDate()),{time:null,title:t.title,who:t.who,type:t.type||'single',schoolOf:t.schoolOf||null});c.setDate(c.getDate()+1);}}
  else if(t.recurring){
    const u=dFA(t.recurring.until);
    let c=t.recurring.from?dFA(t.recurring.from):new Date(2026,0,1);
    while(c.getDay()!==t.recurring.dow)c.setDate(c.getDate()+1);
    while(c<=u){aT(d2s(c.getFullYear(),c.getMonth()+1,c.getDate()),{time:t.time,title:t.title,who:t.who,type:'recurring',schoolOf:null});c.setDate(c.getDate()+7);}
  }
});

function mkPersonBox(name,person,rC,sC,schC,famC){
  const hasAny = rC+sC+schC+famC > 0;
  const box=document.createElement('div');
  box.className='person-box '+(hasAny?person:'inactive');
  const nm=document.createElement('div');nm.className='person-box-name';nm.textContent=name;box.appendChild(nm);
  const ic=document.createElement('div');ic.className='person-box-icons';
  if(person==='familie'){
    ic.appendChild(mkPill('👨‍👩‍👧‍👦',famC));
  } else {
    ic.appendChild(mkPill('🔁',rC));
    ic.appendChild(mkPill('📌',sC));
    ic.appendChild(mkPill('🏫',schC));
  }
  box.appendChild(ic);
  return box;
}

function getBT(b){
  const res=[];let c=dFA(b.von),e=dFA(b.bis);
  while(c<e){const k=d2s(c.getFullYear(),c.getMonth()+1,c.getDate());if(TM[k])TM[k].forEach(t=>res.push({...t,day:c.getDate(),month:c.getMonth()+1}));c.setDate(c.getDate()+1);}
  return res;
}

function renderList(){
  renderStats();
  const con=document.getElementById('list-view');con.innerHTML='';
  const vis=filter==='all'?blocks:blocks.filter(b=>b.wer===filter);
  const grp={},ord=[];
  vis.forEach(b=>{const k=String(b.von[1]);if(!grp[k]){grp[k]=[];ord.push(k);}grp[k].push(b);});

  // Find current block and update banner
  const banner=document.getElementById('current-banner');
  const currentBlock=blocks.find(b=>{ const vd=dFA(b.von),bd=dFA(b.bis); return now>=vd&&now<bd; });
  if(currentBlock){
    const name=currentBlock.wer==='sebastian'?'Sebastian':'Isabel';
    const ferien=currentBlock.ferien?(FERIEN_ICON[currentBlock.ferien]+' '):'';
    banner.className='current-banner'+(currentBlock.wer==='isabel'?' isabel':'');
    banner.style.display='flex';
    banner.innerHTML=`<span class="current-banner-label">Aktuell bei</span><span class="current-banner-date">${ferien}${name} &nbsp;·&nbsp; ${fmt(currentBlock.von)} → ${fmt(currentBlock.bis)}</span>`;
    banner.onclick=()=>{ const c=document.getElementById('current-block'); if(c) c.scrollIntoView({behavior:'smooth',block:'center'}); };
    banner.style.cursor='pointer';
    banner.title='Zur aktuellen Woche springen';
  } else {
    banner.style.display='none';
  }

  let cs=false;
  ord.forEach(k=>{
    const sec=document.createElement('div');sec.className='month-block';
    const ti=document.createElement('div');ti.className='month-title';ti.textContent=MN[parseInt(k)-1]+' 2026';sec.appendChild(ti);
    grp[k].forEach(b=>{
      const bt=getBT(b);
      const card=document.createElement('div');
      let cls='entry-card '+b.wer;
      if(b.ferien)cls+=' f-'+b.ferien;
      const vd=dFA(b.von),bd=dFA(b.bis);
      if(now>=vd&&now<bd&&!cs){card.id='current-block';cs=true;cls+=' current-block';}
      card.className=cls;

      const top=document.createElement('div');top.className='card-inner';

      // Vertical name column
      const nameCol=document.createElement('div');nameCol.className='card-name-col';
      const nameVert=document.createElement('div');nameVert.className='card-name-vert '+b.wer;
      nameVert.textContent=b.wer==='sebastian'?'Sebastian':'Isabel';
      nameCol.appendChild(nameVert);
      top.appendChild(nameCol);

      // Content wrap
      const contentWrap=document.createElement('div');contentWrap.className='card-content-wrap';

      // Ferien icon placeholder (always reserve space or show icon)
      const fi=document.createElement('div');fi.className='card-ferien-icon';
      if(b.ferien){fi.textContent=FERIEN_ICON[b.ferien]||'';fi.title=FERIEN_LABEL[b.ferien]||'';}

      // Row 1: info only
      const row1=document.createElement('div');row1.className='card-row1';
      const body=document.createElement('div');body.className='card-info';
      const n=document.createElement('div');n.className='entry-note'+(b.note?'':' entry-note-empty');n.textContent=b.note||'Keine Notiz';body.appendChild(n);
      const de=document.createElement('div');de.className='entry-date';de.textContent=fmt(b.von)+' → '+fmt(b.bis);body.appendChild(de);
      row1.appendChild(body);
      if(b.ferien)row1.appendChild(fi);
      contentWrap.appendChild(row1);

      // Row 2: person boxes

function calcDays(){
  const dayScores={};
  function getScore(k){if(!dayScores[k])dayScores[k]={s:0,i:0};return dayScores[k];}

  blocks.forEach((b,idx)=>{
    const von=dFA(b.von),bis=dFA(b.bis);
    const isRegelSeb=b.note&&b.note.includes('Fr 13:00');
    const isRegelIsa=b.note&&b.note.includes('Mi 13:30');
    let cur=new Date(von);
    while(cur<bis){
      const key=d2s(cur.getFullYear(),cur.getMonth()+1,cur.getDate());
      const dow=cur.getDay();
      const sc=getScore(key);
      if(isRegelSeb&&b.wer==='sebastian'){
        // Fr(5),Sa(6),So(0),Mo(1),Di(2)=full; Mi(3)=0 (Isabel holt ab)
        if(dow===3){sc.s=0;sc.i=0;}
        else{sc.s=1;sc.i=0;}
      } else if(isRegelIsa&&b.wer==='isabel'){
        // Mi(3),Do(4)=full for Isabel; Fr(5)=0 (Sebastian holt ab)
        if(dow===5){sc.s=0;sc.i=0;}
        else{sc.s=0;sc.i=1;}
      } else {
        if(b.wer==='sebastian'){sc.s=1;sc.i=0;}
        else{sc.s=0;sc.i=1;}
      }
      cur.setDate(cur.getDate()+1);
    }
    // Transition day
    if(idx<blocks.length-1){
      const next=blocks[idx+1];
      const td=dFA(b.bis);
      const tk=d2s(td.getFullYear(),td.getMonth()+1,td.getDate());
      const sc=getScore(tk);
      const note=(b.note||'')+(next.note||'');
      let hour=-1;
      if(note.includes('08:00'))hour=8;
      else if(note.includes('13:00'))hour=13;
      else if(note.includes('13:30'))hour=13;
      else if(note.includes('14:00'))hour=14;
      else if(note.includes('18:00'))hour=18;
      else if(note.toLowerCase().includes('abends'))hour=20;
      if(hour<0||hour>=17){
        if(b.wer==='sebastian'){sc.s=1;sc.i=0;}else{sc.s=0;sc.i=1;}
      } else if(hour<10){
        if(next.wer==='sebastian'){sc.s=1;sc.i=0;}else{sc.s=0;sc.i=1;}
      } else {
        sc.s=0.5;sc.i=0.5;
      }
    }
  });

  let totalS=0,totalI=0;
  const monthly={};
  Object.entries(dayScores).forEach(([key,val])=>{
    const m=key.substring(0,7);
    if(!monthly[m])monthly[m]={s:0,i:0};
    monthly[m].s+=val.s;
    monthly[m].i+=val.i;
    totalS+=val.s;
    totalI+=val.i;
  });
  return{totalS,totalI,monthly};
}

function getCellStyle(val){
  if(!val) return {bg:'var(--warm)',color:'var(--text3)',border:'var(--border)'};
  if(val==='X') return {bg:'var(--sebastian-pale)',color:'var(--sebastian)',border:'var(--sebastian-light)'};
  if(val==='Betreuung') return {bg:'#E8F5E9',color:'#2E7D32',border:'#A5D6A7'};
  if(val.startsWith('Sport')) return {bg:'#FFF0F0',color:'#C0392B',border:'#FFCDD2'};
  if(val==='Jekits') return {bg:'var(--familie-light)',color:'var(--familie)',border:'var(--familie-mid)'};
  if(val.startsWith('Lernzeit')) return {bg:'var(--julius-light)',color:'var(--julius)',border:'var(--julius-mid)'};
  if(val.startsWith('Förder')) return {bg:'var(--rosalie-light)',color:'var(--rosalie)',border:'var(--rosalie-mid)'};
  return {bg:'var(--warm)',color:'var(--text2)',border:'var(--border)'};
}

  table.appendChild(tbody);
  wrap.appendChild(table);
  container.appendChild(wrap);

  // Legende
  const legTitle=document.createElement('div');
  legTitle.style.cssText='font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:6px;font-family:Nunito,sans-serif;';
  legTitle.textContent='Legende';
  container.appendChild(legTitle);
  const legWrap=document.createElement('div');
  legWrap.style.cssText='display:flex;flex-direction:column;gap:3px;';
  sp.legende.forEach(l=>{
    const s=getCellStyle(l.kuerzel==='Förder'?'Förder':l.kuerzel);
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:8px;';
    const badge=document.createElement('div');
    badge.style.cssText=`background:${s.bg};color:${s.color};border:1px solid ${s.border};border-radius:6px;padding:2px 8px;font-size:10px;font-weight:800;font-family:Nunito,sans-serif;min-width:60px;text-align:center;flex-shrink:0;`;
    badge.textContent=l.kuerzel;
    const txt=document.createElement('div');
    txt.style.cssText='font-size:11px;color:var(--text2);';
    txt.textContent=l.text;
    row.appendChild(badge);row.appendChild(txt);
    legWrap.appendChild(row);
  });
  container.appendChild(legWrap);
}

function mkSection(sp, color, borderColor){
  const sec=document.createElement('div');
  sec.style.cssText=`background:var(--surface);border:2px solid ${borderColor};border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);width:100%;`;
  if(sp){
    renderStundenplanTable(sp, sec);
  } else {
    // Placeholder
    const ph=document.createElement('div');
    ph.style.cssText='background:var(--warm);border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:28px 16px;text-align:center;color:var(--text3);';
    ph.innerHTML=`<div style="font-size:22px;margin-bottom:8px;">📋</div><div style="font-size:13px;font-weight:700;color:var(--text3);">Noch nicht eingetragen</div><div style="font-size:11px;margin-top:4px;">Stundenplan schicken → wird direkt eingetragen</div>`;
    sec.appendChild(ph);
  }
  return sec;
}

// ── DARK MODE ──
function toggleDark(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme', isDark?'light':'dark');
  document.getElementById('darkbtn').textContent=isDark?'🌙':'☀️';
  localStorage.setItem('theme', isDark?'light':'dark');
}
(function(){
  const t=localStorage.getItem('theme');
  if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',()=>{const b=document.getElementById('darkbtn');if(b)b.textContent='☀️';});}
})();

updateTodoBadge();

function updateTodoBadge(){
  const open=todos.filter(t=>!t.done).length;
  const tab=document.getElementById('todo-tab');
  if(!tab)return;
  if(open>0){
    tab.style.background='var(--rosalie-light)';
    tab.style.color='var(--rosalie)';
    tab.style.borderBottom='3px solid var(--rosalie)';
  } else {
    tab.style.background='';
    tab.style.color='';
    tab.style.borderBottom='';
  }
}

function renderTodo(){
  updateTodoBadge();
  const con=document.getElementById('todo-view');
  con.innerHTML='';
  con.style.padding='20px';

  const open=todos.filter(t=>!t.done);
  const done=todos.filter(t=>t.done);

  // Info banner
  const info=document.createElement('div');
  info.style.cssText='background:var(--warm);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 14px;margin-bottom:16px;font-size:11px;color:var(--text3);font-weight:600;';
  info.textContent='Punkte werden über den Kalender verwaltet — neue Punkte oder Erledigungen einfach eingeben.';
  con.appendChild(info);

  function mkCard(t){
    const card=document.createElement('div');
    const prioColor=t.prio==='high'?'var(--rosalie-mid)':t.prio==='mid'?'var(--julius-mid)':'var(--text3)';
    card.style.cssText=`background:var(--surface);border:2px solid var(--border);border-left:5px solid ${t.done?'var(--border)':prioColor};border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px;opacity:${t.done?0.45:1};box-shadow:var(--shadow);`;

    // Status icon instead of clickable circle
    const ico=document.createElement('div');
    ico.style.cssText='font-size:16px;flex-shrink:0;width:22px;text-align:center;';
    ico.textContent=t.done?'✅':'⬜';

    const txt=document.createElement('div');
    txt.style.cssText=`flex:1;font-size:13px;font-weight:600;color:var(--text);${t.done?'text-decoration:line-through;color:var(--text3);':''}`;
    txt.textContent=t.text;

    const prio=document.createElement('div');
    prio.style.cssText=`font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;background:${t.done?'var(--warm)':prioColor+'22'};color:${t.done?'var(--text3)':prioColor};border:1px solid ${t.done?'var(--border)':prioColor};flex-shrink:0;font-family:Nunito,sans-serif;text-transform:uppercase;`;
    prio.textContent=t.prio==='high'?'Dringend':t.prio==='mid'?'Offen':'Irgendwann';

    card.appendChild(ico);card.appendChild(txt);card.appendChild(prio);
    return card;
  }

  if(open.length){
    const ot=document.createElement('div');
    ot.style.cssText='font-family:Nunito,sans-serif;font-size:12px;font-weight:900;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;';
    ot.textContent=`Offen (${open.length})`;
    con.appendChild(ot);
    open.forEach(t=>con.appendChild(mkCard(t)));
  }

  if(done.length){
    const dt=document.createElement('div');
    dt.style.cssText='font-family:Nunito,sans-serif;font-size:12px;font-weight:900;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin:16px 0 10px;';
    dt.textContent=`Erledigt (${done.length})`;
    con.appendChild(dt);
    done.forEach(t=>con.appendChild(mkCard(t)));
  }
}

</script>
