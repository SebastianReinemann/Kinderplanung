<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinderplanung 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --basti: #2563EB;
    --basti-light: #EFF6FF;
    --basti-border: #BFDBFE;
    --bella: #DB2777;
    --bella-light: #FDF2F8;
    --bella-border: #FBCFE8;
    --ferien: #16A34A;
    --ferien-light: #F0FDF4;
    --ferien-border: #BBF7D0;
    --special: #7C3AED;
    --special-light: #F5F3FF;
    --special-border: #DDD6FE;
    --bg: #FAFAF9;
    --surface: #FFFFFF;
    --text: #1C1917;
    --text-muted: #78716C;
    --border: #E7E5E4;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 60px; }

  .top-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 24px 16px; position: sticky; top: 0; z-index: 10; }
  .top-bar h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 12px; }
  .top-bar h1 span { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 400; color: var(--text-muted); margin-left: 8px; letter-spacing: 0; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .pill { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; background: transparent; color: var(--text-muted); transition: all 0.15s; font-weight: 500; }
  .pill:hover { border-color: #A8A29E; color: var(--text); }
  .pill.active-all { background: var(--text); color: #fff; border-color: var(--text); }
  .pill.active-basti { background: var(--basti-light); color: var(--basti); border-color: var(--basti-border); }
  .pill.active-bella { background: var(--bella-light); color: var(--bella); border-color: var(--bella-border); }
  .legend { display: flex; gap: 16px; margin-left: auto; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .content { max-width: 760px; margin: 0 auto; padding: 24px 16px 0; }

  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; font-weight: 500; }
  .stat-val { font-size: 26px; font-weight: 600; font-family: 'DM Mono', monospace; letter-spacing: -1px; }
  .stat-val.basti { color: var(--basti); }
  .stat-val.bella { color: var(--bella); }
  .stat-val.neutral { color: var(--text); }

  .month-section { margin-bottom: 32px; }
  .month-header { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

  .entry { display: grid; grid-template-columns: 200px 1fr auto; align-items: start; gap: 12px; padding: 11px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; border-left-width: 3px; transition: box-shadow 0.15s; }
  .entry:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .entry.basti { border-left-color: var(--basti); }
  .entry.bella { border-left-color: var(--bella); }
  .entry.has-ferien { background: var(--ferien-light); border-color: var(--ferien-border); border-left-color: var(--ferien); }
  .entry.basti.has-ferien { border-left-color: var(--basti); }
  .entry.bella.has-ferien { border-left-color: var(--bella); }
  .entry.has-special { background: var(--special-light); border-color: var(--special-border); }
  .entry.basti.has-special { border-left-color: var(--basti); }
  .entry.bella.has-special { border-left-color: var(--bella); }

  .entry-date { font-family: 'DM Mono', monospace; font-size: 11.5px; color: var(--text-muted); padding-top: 2px; }
  .entry-who { font-size: 14px; font-weight: 600; }
  .entry-who.basti { color: var(--basti); }
  .entry-who.bella { color: var(--bella); }
  .entry-note { font-size: 11px; color: var(--text-muted); font-style: italic; display: block; font-weight: 400; margin-top: 3px; }

  .tags { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
  .tag { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .tag-ferien { background: #DCFCE7; color: #15803D; border: 1px solid #BBF7D0; }
  .tag-special { background: var(--special-light); color: var(--special); border: 1px solid var(--special-border); }

  @media (max-width: 540px) {
    .top-bar { padding: 16px; }
    .legend { display: none; }
    .stats { grid-template-columns: 1fr 1fr; }
    .stat-card:last-child { display: none; }
    .entry { grid-template-columns: 1fr; gap: 6px; }
    .tags { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Kinderplanung <span>2026</span></h1>
  <div class="controls">
    <button class="pill active-all" onclick="setFilter('all')">Alle</button>
    <button class="pill" onclick="setFilter('basti')">Sebastian</button>
    <button class="pill" onclick="setFilter('bella')">Bella</button>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--basti)"></div>Sebastian</div>
      <div class="leg"><div class="leg-dot" style="background:var(--bella)"></div>Bella</div>
      <div class="leg"><div class="leg-dot" style="background:var(--ferien)"></div>Schulferien NRW</div>
      <div class="leg"><div class="leg-dot" style="background:var(--special)"></div>Besonderes</div>
    </div>
  </div>
</div>

<div class="content">
  <div class="stats">
    <div class="stat-card"><div class="stat-label">Blöcke Sebastian</div><div class="stat-val basti" id="cnt-basti">–</div></div>
    <div class="stat-card"><div class="stat-label">Blöcke Bella</div><div class="stat-val bella" id="cnt-bella">–</div></div>
    <div class="stat-card"><div class="stat-label">Gesamt</div><div class="stat-val neutral" id="cnt-total">–</div></div>
  </div>
  <div id="cal"></div>
</div>

<script>
const data = [
  // JANUAR
  { von:'16.01.', bis:'23.01. 13:00', wer:'bella', note:null, ferien:null, special:null },
  { von:'23.01. 13:00', bis:'28.01. 08:00', wer:'basti', note:'Fr 13:00 → Mi 08:00', ferien:null, special:null },
  { von:'28.01.', bis:'06.02. 13:00', wer:'bella', note:null, ferien:null, special:null },

  // FEBRUAR
  { von:'06.02. 13:00', bis:'11.02. 08:00', wer:'basti', note:'Fr 13:00 → Mi 08:00', ferien:null, special:null },
  { von:'11.02.', bis:'20.02. 13:00', wer:'bella', note:null, ferien:null, special:null },
  { von:'20.02. 13:00', bis:'25.02. 08:00', wer:'basti', note:'Fr 13:00 → Mi 08:00', ferien:null, special:null },
  { von:'25.02.', bis:'06.03. 13:00', wer:'bella', note:null, ferien:null, special:null },

  // MÄRZ
  { von:'06.03. 13:00', bis:'11.03. 08:00', wer:'basti', note:'Fr 13:00 → Mi 08:00', ferien:null, special:null },
  { von:'11.03.', bis:'20.03. 13:00', wer:'bella', note:null, ferien:null, special:null },
  { von:'20.03. 13:00', bis:'25.03. 08:00', wer:'basti', note:'Fr 13:00 → Mi 08:00', ferien:null, special:null },
  { von:'25.03.', bis:'29.03. Abends', wer:'bella', note:null, ferien:null, special:null },

  // OSTERFERIEN
  { von:'29.03. Abends', bis:'06.04. Abends', wer:'basti', note:'Ferienblock', ferien:'Osterferien (30.03–11.04)', special:null },
  { von:'06.04. Abends', bis:'09.04. Abends', wer:'bella', note:'Ferienblock', ferien:'Osterferien (30.03–11.04)', special:null },
  { von:'09.04. Abends', bis:'15.04.', wer:'basti', note:'Ferienblock', ferien:'Osterferien (30.03–11.04)', special:'Efteling mit der Familie (10.04.)' },
  { von:'15.04.', bis:'17.04.', wer:'bella', note:'Ferienblock', ferien:'Osterferien (30.03–11.04)', special:null },
  { von:'17.04.', bis:'18.04. Abends', wer:'basti', note:'Ferienblock', ferien:'Osterferien (30.03–11.04)', special:null },
  { von:'18.04. Abends', bis:'01.05. 13:00', wer:'bella', note:null, ferien:null, special:null },

  // MAI
  { von:'01.05. 13:00', bis:'06.05. 08:00', wer:'basti', note:'Fr 13:00 → Mi 08:00', ferien:null, special:null },
  { von:'06.05.', bis:'15.05. 13:00', wer:'bella', note:null, ferien:null, special:null },
  { von:'15.05. 13:00', bis:'20.05. 08:00', wer:'basti', note:'Fr 13:00 → Mi 08:00', ferien:null, special:null },
  { von:'20.05.', bis:'29.05. 13:00', wer:'bella', note:null, ferien:'Pfingsten (26.05)', special:null },
  { von:'29.05. 13:00', bis:'03.06. 08:00', wer:'basti', note:'Fr 13:00 → Mi 08:00', ferien:null, special:null },

  // JUNI
  { von:'03.06.', bis:'12.06. 13:00', wer:'bella', note:null, ferien:null, special:null },
  { von:'12.06. 13:00', bis:'17.06. 08:00', wer:'basti', note:'Fr 13:00 → Mi 08:00', ferien:null, special:null },
  { von:'17.06.', bis:'26.06. 13:00', wer:'bella', note:null, ferien:null, special:null },
  { von:'26.06. 13:00', bis:'01.07. 08:00', wer:'basti', note:'Fr 13:00 → Mi 08:00', ferien:null, special:null },

  // JULI (vor Sommerferien)
  { von:'01.07.', bis:'10.07. 13:00', wer:'bella', note:null, ferien:null, special:null },
  { von:'10.07. 13:00', bis:'15.07. 08:00', wer:'basti', note:'Fr 13:00 → Mi 08:00', ferien:null, special:null },
  { von:'15.07.', bis:'17.07.', wer:'bella', note:null, ferien:null, special:null },

  // SOMMERFERIEN
  { von:'17.07.', bis:'08.08.', wer:'basti', note:'Ferienblock', ferien:'Sommerferien (20.07–01.09)', special:null },
  { von:'08.08.', bis:'01.09.', wer:'bella', note:'Ferienblock', ferien:'Sommerferien (20.07–01.09)', special:null },

  // SEPTEMBER
  { von:'01.09.', bis:'04.09. 13:00', wer:'bella', note:null, ferien:null, special:null },
  { von:'04.09. 13:00', bis:'09.09. 08:00', wer:'basti', note:'Fr 13:00 → Mi 08:00', ferien:null, special:null },
  { von:'09.09.', bis:'18.09. 13:00', wer:'bella', note:null, ferien:null, special:null },
  { von:'18.09. 13:00', bis:'23.09. 08:00', wer:'basti', note:'Fr 13:00 → Mi 08:00', ferien:null, special:null },
  { von:'23.09.', bis:'02.10. 13:00', wer:'bella', note:null, ferien:null, special:null },

  // OKTOBER
  { von:'02.10. 13:00', bis:'07.10. 08:00', wer:'basti', note:'Fr 13:00 → Mi 08:00', ferien:null, special:null },
  { von:'07.10.', bis:'16.10. 13:00', wer:'bella', note:null, ferien:null, special:null },
  { von:'16.10. 13:00', bis:'23.10.', wer:'basti', note:'Ferienblock', ferien:'Herbstferien (17.10–31.10)', special:null },
  { von:'23.10.', bis:'30.10.', wer:'bella', note:'Ferienblock', ferien:'Herbstferien (17.10–31.10)', special:null },
  { von:'30.10.', bis:'04.11. 08:00', wer:'basti', note:'Ferienblock', ferien:'Herbstferien (17.10–31.10)', special:null },

  // NOVEMBER
  { von:'04.11.', bis:'13.11. 13:00', wer:'bella', note:null, ferien:null, special:null },
  { von:'13.11. 13:00', bis:'18.11. 08:00', wer:'basti', note:'Fr 13:00 → Mi 08:00', ferien:null, special:null },
  { von:'18.11.', bis:'27.11. 13:00', wer:'bella', note:null, ferien:null, special:null },
  { von:'27.11. 13:00', bis:'02.12. 08:00', wer:'basti', note:'Fr 13:00 → Mi 08:00', ferien:null, special:null },

  // DEZEMBER
  { von:'02.12.', bis:'11.12. 13:00', wer:'bella', note:null, ferien:null, special:null },
  { von:'11.12. 13:00', bis:'16.12. 08:00', wer:'basti', note:'Fr 13:00 → Mi 08:00', ferien:null, special:null },
  { von:'16.12.', bis:'23.12.', wer:'bella', note:null, ferien:null, special:null },
  { von:'23.12.', bis:'30.12.', wer:'basti', note:'Ferienblock', ferien:'Winterferien (23.12–06.01)', special:null },
  { von:'30.12.', bis:'06.01.2027', wer:'bella', note:'Ferienblock', ferien:'Winterferien (23.12–06.01)', special:null },
];

const monthNames = {'1':'Januar 2026','2':'Februar 2026','3':'März 2026','4':'April 2026','5':'Mai 2026','6':'Juni 2026','7':'Juli 2026','8':'August 2026','9':'September 2026','10':'Oktober 2026','11':'November 2026','12':'Dezember 2026'};

function getKey(e) {
  const m = e.von.match(/(\d{1,2})\.(\d{1,2})\./);
  if (!m) return '1';
  return String(parseInt(m[2]));
}

let filter = 'all';

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.pill').forEach(b => {
    b.className = 'pill';
    const t = b.textContent.trim().toLowerCase();
    if (f === 'all' && t === 'alle') b.className = 'pill active-all';
    else if (f === 'basti' && t === 'sebastian') b.className = 'pill active-basti';
    else if (f === 'bella' && t === 'bella') b.className = 'pill active-bella';
  });
  render();
}

function render() {
  const bc = data.filter(e => e.wer === 'basti').length;
  const bec = data.filter(e => e.wer === 'bella').length;
  document.getElementById('cnt-basti').textContent = bc;
  document.getElementById('cnt-bella').textContent = bec;
  document.getElementById('cnt-total').textContent = data.length;

  const visible = filter === 'all' ? data : data.filter(e => e.wer === filter);

  const grouped = {};
  const order = [];
  visible.forEach(e => {
    const k = getKey(e);
    if (!grouped[k]) { grouped[k] = []; order.push(k); }
    grouped[k].push(e);
  });

  const cal = document.getElementById('cal');
  cal.innerHTML = '';

  order.forEach(k => {
    const sec = document.createElement('div');
    sec.className = 'month-section';
    const hdr = document.createElement('div');
    hdr.className = 'month-header';
    hdr.textContent = monthNames[k] || ('Monat ' + k);
    sec.appendChild(hdr);

    grouped[k].forEach(e => {
      const div = document.createElement('div');
      let cls = 'entry ' + e.wer;
      if (e.ferien) cls += ' has-ferien';
      if (e.special) cls += ' has-special';
      div.className = cls;

      const label = e.wer === 'basti' ? 'Sebastian' : 'Bella';
      const dateStr = e.bis ? e.von + ' → ' + e.bis : e.von;

      div.innerHTML =
        '<div class="entry-date">' + dateStr + '</div>' +
        '<div class="entry-who ' + e.wer + '">' + label +
          (e.note ? '<span class="entry-note">' + e.note + '</span>' : '') +
        '</div>' +
        '<div class="tags">' +
          (e.ferien ? '<span class="tag tag-ferien">' + e.ferien + '</span>' : '') +
          (e.special ? '<span class="tag tag-special">' + e.special + '</span>' : '') +
        '</div>';

      sec.appendChild(div);
    });
    cal.appendChild(sec);
  });
}

render();
</script>
</body>
</html>
