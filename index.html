<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet">

:root {
  --sebastian: #2D8C4E; --sebastian-mid: #4AAD6A; --sebastian-light: #E8F7EE; --sebastian-pale: #F3FBF6;
  --isabel: #2563EB; --isabel-mid: #4B80F0; --isabel-light: #E8F0FE; --isabel-pale: #F0F5FF;
  --julius: #D97706; --julius-mid: #F59E0B; --julius-light: #FEF3C7;
  --rosalie: #DB2777; --rosalie-mid: #EC4899; --rosalie-light: #FCE7F3;
  --familie: #7C3AED; --familie-mid: #8B5CF6; --familie-light: #EDE9FE;
  --bg: #FAF8F5; --surface: #FFFFFF; --warm: #F5F1EB; --warm2: #EDE8E0;
  --text: #2D2926; --text2: #6B6560; --text3: #A89F96; --border: #E8E2D9;
  --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-lg: 0 4px 24px rgba(0,0,0,0.1);

}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: var(--surface); border-bottom: 2px solid var(--border); padding: 0 24px; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 30; }
.header-inner { display: flex; align-items: center; gap: 16px; padding: 14px 0 0; flex-wrap: wrap; }
.logo { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 900; letter-spacing: -0.5px; color: var(--text); }
.logo span { color: var(--sebastian-mid); }
.year-badge { background: var(--warm); color: var(--text3); font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); }
.filters { display: flex; gap: 6px; margin-left: auto; }
.filter-btn { padding: 7px 16px; border-radius: 20px; border: 2px solid var(--border); font-size: 13px; font-weight: 700; cursor: pointer; background: var(--warm); color: var(--text2); transition: all 0.15s; font-family: 'Nunito', sans-serif; }
.filter-btn.active-all { background: var(--text); color: #fff; border-color: var(--text); }
.filter-btn.active-sebastian { background: var(--sebastian-light); color: var(--sebastian); border-color: var(--sebastian-mid); }
.filter-btn.active-isabel { background: var(--isabel-light); color: var(--isabel); border-color: var(--isabel-mid); }
.tabs { display: flex; margin-top: 12px; }
.tab { padding: 10px 20px; font-size: 13px; font-weight: 700; cursor: pointer; background: transparent; color: var(--text3); border: none; border-bottom: 3px solid transparent; transition: all 0.15s; font-family: 'Nunito', sans-serif; }
.tab.active { color: var(--text); border-bottom-color: var(--sebastian-mid); }

.changelog { background: #FFFBF0; border-bottom: 2px solid #F3E8C0; padding: 10px 24px; }
.changelog-title { font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--julius); margin-bottom: 6px; }
.changelog-empty { font-size: 12px; color: var(--text3); font-style: italic; }
.changelog-list { display: flex; flex-direction: column; gap: 3px; }
.changelog-item { display: flex; gap: 10px; font-size: 12px; }
.changelog-date { font-weight: 700; color: var(--julius); min-width: 70px; flex-shrink: 0; font-family: 'Nunito', sans-serif; font-size: 11px; }
.changelog-text { color: var(--text2); }

.stats-bar { display: flex; gap: 12px; padding: 14px 24px; background: var(--warm); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.stat-chip { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 30px; padding: 5px 14px 5px 8px; box-shadow: var(--shadow); }
.stat-chip-dot { width: 10px; height: 10px; border-radius: 50%; }
.stat-chip-label { font-size: 11px; color: var(--text3); font-weight: 600; }
.stat-chip-val { font-size: 15px; font-weight: 900; font-family: 'Nunito', sans-serif; margin-left: 2px; }
.stat-chip-val.s { color: var(--sebastian); }
.stat-chip-val.b { color: var(--isabel); }
.stat-chip-val.n { color: var(--text); }

.content { padding: 24px; max-width: 960px; margin: 0 auto; }
.month-block { margin-bottom: 28px; }
.month-title { font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 900; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
.month-title::after { content: ''; flex: 1; height: 2px; background: var(--border); border-radius: 2px; }

.entry-card { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); margin-bottom: 7px; box-shadow: var(--shadow); transition: transform 0.12s, box-shadow 0.12s; overflow: hidden; cursor: pointer; }
.entry-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.entry-card.sebastian { border-left: 5px solid var(--sebastian-mid); }
.entry-card.isabel { border-left: 5px solid var(--isabel-mid); }
.entry-card.current-block { box-shadow: 0 0 0 3px rgba(74,173,106,0.35), var(--shadow-lg); }
.entry-card.f-oster { background: #FFFBEB; }
.entry-card.f-pfingst { background: #F0FDF4; }
.entry-card.f-sommer { background: #FFF5F5; }
.entry-card.f-herbst { background: #FFFBEB; }
.entry-card.f-winter { background: #EFF6FF; }

.card-top { height: var(--card-h); display: grid; grid-template-columns: 42px 1fr auto; align-items: center; }

.card-ferien-col { width: 42px; height: var(--card-h); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }

.card-body { padding: 0 14px; min-width: 0; }
.entry-who { font-size: 14px; font-weight: 800; font-family: 'Nunito', sans-serif; }
.entry-who.sebastian { color: var(--sebastian); }
.entry-who.isabel { color: var(--isabel); }
.entry-note { font-size: 11px; color: var(--text3); font-weight: 600; margin-top: 1px; }
.entry-date { font-size: 17px; color: var(--text2); font-weight: 800; font-family: 'Nunito', sans-serif; white-space: nowrap; margin-top: 3px; }

.card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-right: 14px; }
.badge-sep { width: 1px; height: 40px; background: var(--border); flex-shrink: 0; }

.badge-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.badge-group-name { font-size: 10px; font-weight: 800; font-family: 'Nunito', sans-serif; }
.badge-group-name.rosalie { color: var(--rosalie); }
.badge-group-name.julius { color: var(--julius); }
.badge-group-name.familie { color: var(--familie); }
.badge-icons { display: flex; gap: 3px; }

.bp { display: flex; align-items: center; gap: 2px; font-size: 10px; font-weight: 800; font-family: 'Nunito', sans-serif; padding: 2px 5px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--warm); color: var(--text3); }
.bp.ar { border-color: var(--rosalie-mid); background: var(--rosalie-light); color: var(--rosalie); }
.bp.aj { border-color: var(--julius-mid); background: var(--julius-light); color: var(--julius); }
.bp.af { border-color: var(--familie-mid); background: var(--familie-light); color: var(--familie); }
.bp.zero { opacity: 0.28; }

.chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; display: block; }
.chevron.open { transform: rotate(180deg); }

.entry-accordion { display: none; border-top: 1px solid var(--border); padding: 10px 16px 12px; }
.entry-accordion.open { display: block; }
.acc-sec { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); padding: 6px 0 4px; font-family: 'Nunito', sans-serif; }
.acc-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.acc-item:last-child { border-bottom: none; }
.acc-bar { width: 3px; height: 26px; border-radius: 2px; flex-shrink: 0; }
.acc-bar.julius { background: var(--julius); }
.acc-bar.rosalie { background: var(--rosalie); }
.acc-bar.both { background: var(--text3); }
.acc-bar.familie { background: var(--familie); }
.acc-time { font-size: 12px; font-weight: 700; color: var(--text3); min-width: 48px; font-family: 'Nunito', sans-serif; }
.acc-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.acc-who { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 10px; font-family: 'Nunito', sans-serif; }
.acc-who.julius { background: var(--julius-light); color: var(--julius); }
.acc-who.rosalie { background: var(--rosalie-light); color: var(--rosalie); }
.acc-who.both { background: var(--warm2); color: var(--text2); }
.acc-who.familie { background: var(--familie-light); color: var(--familie); }

.cal-view { display: none; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.cal-nav-btn { width: 40px; height: 40px; background: var(--surface); border: 2px solid var(--border); border-radius: 50%; cursor: pointer; color: var(--text2); font-size: 18px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); transition: all 0.15s; }
.cal-nav-btn:hover { border-color: var(--sebastian-mid); }
.cal-month-title { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 900; }
.cal-dow-row { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; margin-bottom: 6px; }
.cal-dow { text-align: center; font-size: 12px; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; padding: 4px 0; font-family: 'Nunito', sans-serif; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
.day { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 8px 6px 6px; min-height: 90px; transition: all 0.15s; box-shadow: var(--shadow); display: flex; flex-direction: column; }
.day.empty { background: transparent; border-color: transparent; box-shadow: none; }
.day:hover:not(.empty) { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: var(--text3); }
.day.today { border-color: var(--sebastian-mid) !important; box-shadow: 0 0 0 3px rgba(74,173,106,0.2); }
.day.all-sebastian { background: var(--sebastian-pale); border-color: var(--sebastian-light); }
.day.all-isabel { background: var(--isabel-pale); border-color: var(--isabel-light); }
.day.split { background: linear-gradient(135deg, var(--sebastian-pale) 50%, var(--isabel-pale) 50%); }
.day.split.i2s { background: linear-gradient(135deg, var(--isabel-pale) 50%, var(--sebastian-pale) 50%); }
.day-num { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900; color: var(--text3); line-height: 1; margin-bottom: 5px; display: inline-block; }
.day.all-sebastian .day-num { color: var(--sebastian); }
.day.all-isabel .day-num { color: var(--isabel); }
.day.today .day-num { background: var(--sebastian-mid); color: #fff; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; margin-bottom: 5px; }
.day-events { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.day-event { font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 4px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-family: 'Nunito', sans-serif; }
.day-event.ferien { background: rgba(245,158,11,0.15); color: #92400E; }
.day-event.julius { background: var(--julius-light); color: var(--julius); }
.day-event.rosalie { background: var(--rosalie-light); color: var(--rosalie); }
.day-event.both { background: var(--warm2); color: var(--text2); }
.day-event.familie { background: var(--familie-light); color: var(--familie); }

@media (max-width: 640px) {
  .content { padding: 16px; }
  .stats-bar, .changelog { padding: 10px 16px; }
  .header { padding: 0 16px; }
  .day { min-height: 56px; padding: 4px; }
  .day-event { display: none; }
  .day-num { font-size: 13px; }
  .cal-grid { gap: 3px; }
  .card-right { gap: 5px; }
}
</style>
</head>

function d2s(y,m,d){return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function dFA(a){return new Date(a[0],a[1]-1,a[2]);}
function fmt(a){return String(a[2]).padStart(2,'0')+'.'+String(a[1]).padStart(2,'0')+'.';}

const dayMap={};
blocks.forEach(b=>{let c=dFA(b.von),e=dFA(b.bis);while(c<e){const k=d2s(c.getFullYear(),c.getMonth()+1,c.getDate());if(!dayMap[k])dayMap[k]={wer:b.wer,ferien:b.ferien,trans:false};c.setDate(c.getDate()+1);}});
blocks.forEach((b,i)=>{if(i<blocks.length-1){const td=dFA(b.bis),k=d2s(td.getFullYear(),td.getMonth()+1,td.getDate());if(dayMap[k]){dayMap[k].trans=true;dayMap[k].fromWer=b.wer;dayMap[k].toWer=blocks[i+1].wer;}}});

const TM={};
function aT(k,t){if(!TM[k])TM[k]=[];TM[k].push(t);}
TR.forEach(t=>{
  if(t.date){aT(d2s(t.date[0],t.date[1],t.date[2]),{time:t.time,title:t.title,who:t.who,type:t.type,schoolOf:t.schoolOf||null});}
  else if(t.dateRange){let c=dFA(t.dateRange[0]),e=dFA(t.dateRange[1]);while(c<=e){aT(d2s(c.getFullYear(),c.getMonth()+1,c.getDate()),{time:null,title:t.title,who:t.who,type:t.type||'single',schoolOf:t.schoolOf||null});c.setDate(c.getDate()+1);}}
  else if(t.recurring){const u=dFA(t.recurring.until);let c=new Date(2026,0,1);while(c.getDay()!==t.recurring.dow)c.setDate(c.getDate()+1);while(c<=u){aT(d2s(c.getFullYear(),c.getMonth()+1,c.getDate()),{time:t.time,title:t.title,who:t.who,type:'recurring',schoolOf:null});c.setDate(c.getDate()+7);}}
});

const MN=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const DN=['Mo','Di','Mi','Do','Fr','Sa','So'];
let filter='all',view='list',calYear=2026;
const now=new Date();
let calMonth=now.getFullYear()===2026?now.getMonth()+1:1;

function svgR(c){return`<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M1.5 6a4.5 4.5 0 0 1 7.2-3.6L10 1v3H7l1-1A3 3 0 1 0 9 8.5" stroke="${c}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}
function svgS(c){return`<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="${c}" stroke-width="1.4"/><line x1="6" y1="3.5" x2="6" y2="6.2" stroke="${c}" stroke-width="1.4" stroke-linecap="round"/><circle cx="6" cy="8" r="0.7" fill="${c}"/></svg>`;}
function svgSch(c){return`<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><polygon points="6,1 1,4 11,4" stroke="${c}" stroke-width="1.2" fill="none" stroke-linejoin="round"/><rect x="1" y="4" width="10" height="7" rx="0.8" stroke="${c}" stroke-width="1.2" fill="none"/><rect x="4.5" y="7" width="3" height="3" rx="0.4" stroke="${c}" stroke-width="1" fill="none"/></svg>`;}

function mkPill(svgFn,count,person){
  const p=document.createElement('div');
  const active=count>0;
  p.className='bp'+(active?' a'+person[0]:' zero');
  const col=active?`var(--${person}-mid)`:'var(--text3)';
  p.innerHTML=svgFn(col)+`<span>${count}</span>`;
  return p;
}

function mkGroup(name,person,rC,sC,schC){
  const g=document.createElement('div');g.className='badge-group';
  const nm=document.createElement('div');nm.className='badge-group-name '+person;nm.textContent=name;g.appendChild(nm);
  const ic=document.createElement('div');ic.className='badge-icons';
  ic.appendChild(mkPill(svgR,rC,person));
  ic.appendChild(mkPill(svgS,sC,person));
  ic.appendChild(mkPill(svgSch,schC,person));
  g.appendChild(ic);return g;
}

function mkSep(){const s=document.createElement('div');s.className='badge-sep';return s;}

function renderChangelog(){
  const body=document.getElementById('changelog-body');
  if(!changelog||!changelog.length){body.innerHTML='<div class="changelog-empty">Noch keine Änderungen eingetragen.</div>';return;}
  const list=document.createElement('div');list.className='changelog-list';
  changelog.slice(0,5).forEach(c=>{
    const i=document.createElement('div');i.className='changelog-item';
    const d=document.createElement('div');d.className='changelog-date';d.textContent=c.date;
    const t=document.createElement('div');t.className='changelog-text';t.textContent=c.text;
    i.appendChild(d);i.appendChild(t);list.appendChild(i);
  });
  body.innerHTML='';body.appendChild(list);
}

function setFilter(f){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.className='filter-btn';
    const t=b.textContent.trim().toLowerCase();
    if(f==='all'&&t==='alle')b.className='filter-btn active-all';
    else if(f==='sebastian'&&t==='sebastian')b.className='filter-btn active-sebastian';
    else if(f==='isabel'&&t==='isabel')b.className='filter-btn active-isabel';
  });
  if(view==='list')renderList();else renderCal();
}

function setView(v,e){
  view=v;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('list-view').style.display=v==='list'?'':'none';
  document.getElementById('cal-view').style.display=v==='cal'?'block':'none';
  if(v==='cal')renderCal();
}

function prevMonth(){calMonth--;if(calMonth<1){calMonth=12;calYear--;}renderCal();}
function nextMonth(){calMonth++;if(calMonth>12){calMonth=1;calYear++;}renderCal();}

function renderStats(){
  document.getElementById('cnt-s').textContent=blocks.filter(b=>b.wer==='sebastian').length;
  document.getElementById('cnt-b').textContent=blocks.filter(b=>b.wer==='isabel').length;
  document.getElementById('cnt-t').textContent=blocks.length;
}

function getBT(b){
  const res=[];let c=dFA(b.von),e=dFA(b.bis);
  while(c<e){const k=d2s(c.getFullYear(),c.getMonth()+1,c.getDate());if(TM[k])TM[k].forEach(t=>res.push({...t,day:c.getDate(),month:c.getMonth()+1}));c.setDate(c.getDate()+1);}
  return res;
}

function renderList(){
  renderStats();
  const con=document.getElementById('list-view');con.innerHTML='';
  const vis=filter==='all'?blocks:blocks.filter(b=>b.wer===filter);
  const grp={},ord=[];
  vis.forEach(b=>{const k=String(b.von[1]);if(!grp[k]){grp[k]=[];ord.push(k);}grp[k].push(b);});
  let cs=false;
  ord.forEach(k=>{
    const sec=document.createElement('div');sec.className='month-block';
    const ti=document.createElement('div');ti.className='month-title';ti.textContent=MN[parseInt(k)-1]+' 2026';sec.appendChild(ti);
    grp[k].forEach(b=>{
      const bt=getBT(b);
      const card=document.createElement('div');
      let cls='entry-card '+b.wer;
      if(b.ferien)cls+=' f-'+b.ferien;
      const vd=dFA(b.von),bd=dFA(b.bis);
      if(now>=vd&&now<bd&&!cs){card.id='current-block';cs=true;cls+=' current-block';}
      card.className=cls;

      const top=document.createElement('div');top.className='card-top';

      // Ferien icon
      const fc=document.createElement('div');fc.className='card-ferien-col';
      fc.textContent=b.ferien?(FERIEN_ICON[b.ferien]||''):'';
      fc.title=b.ferien?(FERIEN_LABEL[b.ferien]||''):'';
      top.appendChild(fc);

      // Body
      const body=document.createElement('div');body.className='card-body';
      const who=document.createElement('div');who.className='entry-who '+b.wer;who.textContent=b.wer==='sebastian'?'Sebastian':'Isabel';body.appendChild(who);
      if(b.note){const n=document.createElement('div');n.className='entry-note';n.textContent=b.note;body.appendChild(n);}
      const de=document.createElement('div');de.className='entry-date';de.textContent=fmt(b.von)+' → '+fmt(b.bis);body.appendChild(de);
      top.appendChild(body);

      // Right
      const right=document.createElement('div');right.className='card-right';
      const rR=bt.filter(t=>t.type==='recurring'&&t.who==='rosalie').length;
      const sR=bt.filter(t=>t.type==='single'&&!t.schoolOf&&(t.who==='rosalie'||t.who==='both')).length;
      const schR=bt.filter(t=>t.schoolOf==='rosalie').length;
      const rJ=bt.filter(t=>t.type==='recurring'&&t.who==='julius').length;
      const sJ=bt.filter(t=>t.type==='single'&&!t.schoolOf&&(t.who==='julius'||t.who==='both')).length;
      const schJ=bt.filter(t=>t.schoolOf==='julius').length;
      const fC=bt.filter(t=>t.who==='familie').length;

      right.appendChild(mkGroup('Rosalie','rosalie',rR,sR,schR));
      right.appendChild(mkSep());
      right.appendChild(mkGroup('Julius','julius',rJ,sJ,schJ));
      right.appendChild(mkSep());

      const famG=document.createElement('div');famG.className='badge-group';
      const famN=document.createElement('div');famN.className='badge-group-name familie';famN.textContent='Familie';
      const famI=document.createElement('div');famI.className='badge-icons';
      famI.appendChild(mkPill(svgS,fC,'familie'));
      famG.appendChild(famN);famG.appendChild(famI);right.appendChild(famG);

      if(bt.length>0){const ch=document.createElement('span');ch.className='chevron';ch.id='chev-'+b.von.join('-');ch.textContent='▼';right.appendChild(ch);}
      top.appendChild(right);card.appendChild(top);

      // Accordion
      if(bt.length>0){
        const acc=document.createElement('div');acc.className='entry-accordion';acc.id='acc-'+b.von.join('-');
        function bI(t){
          const item=document.createElement('div');item.className='acc-item';
          const bar=document.createElement('div');bar.className='acc-bar '+(t.who==='familie'?'familie':t.who==='both'?'both':t.who);
          const tm=document.createElement('div');tm.className='acc-time';tm.textContent=String(t.day).padStart(2,'0')+'.'+String(t.month).padStart(2,'0')+'.'+(t.time?' '+t.time:'');
          const ttl=document.createElement('div');ttl.className='acc-title';ttl.textContent=t.title;
          const wh=document.createElement('div');wh.className='acc-who '+(t.who==='familie'?'familie':t.who==='both'?'both':t.who);
          wh.textContent=t.who==='julius'?'Julius':t.who==='rosalie'?'Rosalie':t.who==='familie'?'Familie':'Beide';
          item.appendChild(bar);item.appendChild(tm);item.appendChild(ttl);item.appendChild(wh);return item;
        }
        function aS(label,items,first){
          if(!items.length)return;
          const s=document.createElement('div');s.className='acc-sec';if(!first)s.style.marginTop='8px';s.textContent=label;acc.appendChild(s);
          items.forEach(t=>acc.appendChild(bI(t)));
        }
        const rTs=bt.filter(t=>t.type==='recurring');
        const sTs=bt.filter(t=>t.type==='single'&&!t.schoolOf&&t.who!=='familie');
        const fTs=bt.filter(t=>t.who==='familie');
        const srTs=bt.filter(t=>t.schoolOf==='rosalie');
        const sjTs=bt.filter(t=>t.schoolOf==='julius');
        let f=true;
        if(rTs.length){aS('🔁 Regeltermine',rTs,f);f=false;}
        if(sTs.length){aS('📌 Einzeltermine',sTs,f);f=false;}
        if(fTs.length){aS('👨‍👩‍👧‍👦 Familientermine',fTs,f);f=false;}
        if(srTs.length){aS('🏫 Schultermine Rosalie',srTs,f);f=false;}
        if(sjTs.length){aS('🏫 Schultermine Julius',sjTs,f);}
        card.appendChild(acc);
        card.onclick=()=>{
          const a=document.getElementById('acc-'+b.von.join('-'));
          const c=document.getElementById('chev-'+b.von.join('-'));
          if(a){a.classList.toggle('open');if(c)c.classList.toggle('open');}
        };
      }
      sec.appendChild(card);
    });
    con.appendChild(sec);
  });
}

function renderCal(){
  renderStats();
  document.getElementById('cal-title').textContent=MN[calMonth-1]+' '+calYear;
  const dr=document.getElementById('cal-dows');dr.innerHTML='';
  DN.forEach(d=>{const el=document.createElement('div');el.className='cal-dow';el.textContent=d;dr.appendChild(el);});
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  const fd=new Date(calYear,calMonth-1,1);
  let sd=fd.getDay();sd=sd===0?6:sd-1;
  const dim=new Date(calYear,calMonth,0).getDate();
  const iT=d=>now.getFullYear()===calYear&&now.getMonth()===calMonth-1&&now.getDate()===d;
  for(let i=0;i<sd;i++){const el=document.createElement('div');el.className='day empty';grid.appendChild(el);}
  for(let day=1;day<=dim;day++){
    const key=d2s(calYear,calMonth,day);
    const info=dayMap[key];const ts=TM[key]||[];
    const el=document.createElement('div');let cls='day';
    if(info){
      const show=filter==='all'||info.wer===filter||(info.trans&&(info.fromWer===filter||info.toWer===filter));
      if(show){if(info.trans){cls+=' split';if(info.fromWer==='isabel')cls+=' i2s';}else cls+=' all-'+info.wer;}
    }
    if(iT(day))cls+=' today';el.className=cls;
    const num=document.createElement('div');num.className='day-num';num.textContent=day;el.appendChild(num);
    const ew=document.createElement('div');ew.className='day-events';
    if(info){
      const show=filter==='all'||info.wer===filter||(info.trans&&(info.fromWer===filter||info.toWer===filter));
      if(show&&info.ferien){const ev=document.createElement('div');ev.className='day-event ferien';ev.textContent=(FERIEN_ICON[info.ferien]||'')+' '+(FERIEN_LABEL[info.ferien]||'');ew.appendChild(ev);}
    }
    ts.forEach(t=>{const ev=document.createElement('div');ev.className='day-event '+(t.who==='familie'?'familie':t.who==='both'?'both':t.who);ev.textContent=(t.time?t.time+' ':'')+t.title;ew.appendChild(ev);});
    el.appendChild(ew);grid.appendChild(el);
  }
}

renderChangelog();
renderList();
setTimeout(()=>{const c=document.getElementById('current-block');if(c)c.scrollIntoView({behavior:'instant',block:'start'});},50);
</script>
